function App(){
  const [auth, setAuth] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY_AUTH_SESSION);
      return raw ? JSON.parse(raw) : null;
    } catch(err) { return null; }
  });
  const [tab, setTab] = useState("reporting");
  const [ecarts, setEcarts] = useState(SEED_ECARTS);
  const [weekly, setWeekly] = useState(SEED_WEEKLY);
  const [roster, setRoster] = useState(SEED_ROSTER);
  const [nccResponses, setNccResponses] = useState([]);
  const [allEvaluations, setAllEvaluations] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [connStatus, setConnStatus] = useState("connecting"); // connecting | ok | unconfigured | error
  const [connError, setConnError] = useState("");
  const firstLoad = React.useRef(true);
  const remoteUpdateRef = React.useRef({ ecarts: false, weekly: false, roster: false, nccResponses: false, allEvaluations: false });

  // Chargement initial + abonnement temps réel
  useEffect(() => {
    let unsubEcarts = () => {};
    let unsubWeekly = () => {};
    let unsubRoster = () => {};
    let unsubNcc = () => {};
    let unsubEval = () => {};

    (async () => {
      const resE = await fsLoad(STORAGE_KEY_ECARTS, SEED_ECARTS);
      const resW = await fsLoad(STORAGE_KEY_WEEKLY, SEED_WEEKLY);
      const resR = await fsLoad(STORAGE_KEY_ROSTER, SEED_ROSTER);
      const resN = await fsLoad(STORAGE_KEY_NCC_RESPONSES, []);
      const resAE = await fsLoad(STORAGE_KEY_ALL_EVALUATIONS, []);
      // Le chargement initial ne doit jamais déclencher une ré-écriture immédiate :
      // on vient de lire cette donnée, pas besoin de la réenregistrer telle quelle.
      remoteUpdateRef.current = { ecarts: true, weekly: true, roster: true, nccResponses: true, allEvaluations: true };
      setEcarts(resE.value);
      setWeekly(resW.value);
      // Un tableau vide enregistré avant l'ajout du roster ne doit pas écraser SEED_ROSTER
      setRoster(resR.value && resR.value.length > 0 ? resR.value : SEED_ROSTER);
      setNccResponses(resN.value || []);
      setAllEvaluations(resAE.value || []);
      setConnStatus(resE.status);
      setConnError(resE.error || "");
      setLoaded(true);
      firstLoad.current = false;

      if (resE.status === "ok") {
        unsubEcarts = fsSubscribe(STORAGE_KEY_ECARTS, (val) => { remoteUpdateRef.current.ecarts = true; setEcarts(val); });
        unsubWeekly = fsSubscribe(STORAGE_KEY_WEEKLY, (val) => { remoteUpdateRef.current.weekly = true; setWeekly(val); });
        unsubRoster = fsSubscribe(STORAGE_KEY_ROSTER, (val) => { remoteUpdateRef.current.roster = true; setRoster(val && val.length > 0 ? val : SEED_ROSTER); });
        unsubNcc = fsSubscribe(STORAGE_KEY_NCC_RESPONSES, (val) => { remoteUpdateRef.current.nccResponses = true; setNccResponses(val || []); });
        unsubEval = fsSubscribe(STORAGE_KEY_ALL_EVALUATIONS, (val) => { remoteUpdateRef.current.allEvaluations = true; setAllEvaluations(val || []); });
      }
    })();

    return () => { unsubEcarts(); unsubWeekly(); unsubRoster(); unsubNcc(); unsubEval(); };
  }, []);

  // Sauvegarde (debounce) à chaque changement, une fois le chargement initial fait —
  // mais PAS si ce changement provient uniquement d'une mise à jour reçue de Firestore
  // (sinon un onglet resté ouvert peut "renvoyer" une donnée périmée en boucle).
  useEffect(() => {
    if (!loaded) return;
    if (remoteUpdateRef.current.ecarts || remoteUpdateRef.current.weekly || remoteUpdateRef.current.roster
        || remoteUpdateRef.current.nccResponses || remoteUpdateRef.current.allEvaluations) {
      remoteUpdateRef.current = { ecarts: false, weekly: false, roster: false, nccResponses: false, allEvaluations: false };
      return;
    }
    setSaving(true);
    const t = setTimeout(async () => {
      if (connStatus === "ok") {
        await fsSave(STORAGE_KEY_ECARTS, ecarts);
        await fsSave(STORAGE_KEY_WEEKLY, weekly);
        await fsSave(STORAGE_KEY_ROSTER, roster);
        await fsSave(STORAGE_KEY_NCC_RESPONSES, nccResponses);
        await fsSave(STORAGE_KEY_ALL_EVALUATIONS, allEvaluations);
      }
      setSaving(false);
    }, 500);
    return () => clearTimeout(t);
  }, [ecarts, weekly, roster, nccResponses, allEvaluations, loaded, connStatus]);

  async function saveNow(ecartsToSave, weeklyToSave){
    if (connStatus !== "ok") return { ok: false, reason: connStatus };
    setSaving(true);
    await fsSave(STORAGE_KEY_ECARTS, ecartsToSave);
    await fsSave(STORAGE_KEY_WEEKLY, weeklyToSave);
    setSaving(false);
    return { ok: true };
  }

  function importFromJSON(data){
    if (Array.isArray(data.ecarts)) setEcarts(data.ecarts.map((e) => ({...e, id: e.id ?? uid()})));
    if (Array.isArray(data.historique_kpi)) setWeekly(data.historique_kpi);
    if (Array.isArray(data.repartition_equipes)) setRoster(data.repartition_equipes);
    if (Array.isArray(data.ncc_responses)) setNccResponses(data.ncc_responses);
    if (Array.isArray(data.toutes_evaluations)) setAllEvaluations(data.toutes_evaluations);
  }

  /* Intègre automatiquement les écarts détectés depuis les évaluations brutes (14 derniers jours, sous
     objectif ou KO) dans le suivi débriefing — sans action manuelle. Se stabilise tout seul : une fois
     ajoutés, ces écarts sont "connus" et ne sont plus proposés une seconde fois. */
  useEffect(() => {
    if (!auth) return;
    if ((!ecarts || ecarts.length === 0) && (!allEvaluations || allEvaluations.length === 0)) return;
    const pending = computeAutoDetectedEcarts(allEvaluations, ecarts, roster);
    if (pending.length === 0) return;
    const startId = ecarts.reduce((max, e) => Math.max(max, Number(e.id) || 0), 0) + 1;
    const promoted = pending.map((item, i) => ({
      id: startId + i, indicateur: item.indicateur, conseiller: item.conseiller, reference: "",
      semaine: item.semaine, date: item.date, ecart: item.ecart, statut: "À traiter", action: "",
      dateDebrief: "", constat: "Détecté automatiquement depuis les évaluations brutes.",
      managerDispatch: item.managerDispatch, manager: item.manager, alerte: "",
    }));
    const updated = [...ecarts, ...promoted];
    setEcarts(updated);
    if (connStatus === "ok") saveNow(updated, weekly);
  }, [allEvaluations, roster, ecarts, auth, connStatus]);

  function handleLogin(session){
    try { localStorage.setItem(STORAGE_KEY_AUTH_SESSION, JSON.stringify(session)); } catch(err) {}
    setAuth(session);
    setTab(session.role === "admin" ? "reporting" : "reporting");
  }
  function handleLogout(){
    try { localStorage.removeItem(STORAGE_KEY_AUTH_SESSION); } catch(err) {}
    setAuth(null);
  }

  const allTabs = [
    { id:"reporting", label:"Reporting", icon:"📊" },
    { id:"performance", label:"Suivi performance", icon:"📈" },
    { id:"debriefing", label:"Suivi débriefing", icon:"📋" },
    { id:"roster", label:"Répartition équipe", icon:"🧑‍🤝‍🧑" },
    { id:"nps", label:"Analyse NPS", icon:"⭐" },
    { id:"import", label:"Importer", icon:"⬆" },
    { id:"export", label:"Extractions", icon:"🗄" },
  ];
  const tabs = auth && auth.role === "admin" ? allTabs : allTabs.filter((t) => !ADMIN_ONLY_TABS.has(t.id));

  useEffect(() => {
    if (!auth) return;
    if (ADMIN_ONLY_TABS.has(tab) && auth.role !== "admin") setTab("reporting");
  }, [auth, tab]);

  const statusLabel = {
    connecting: "Connexion...",
    ok: saving ? "Enregistrement..." : "Connecté — partagé en ligne (Firebase)",
    unconfigured: "Mode local — Firebase non configuré (voir README)",
    error: "Erreur de connexion Firebase — données non partagées",
  }[connStatus];

  if (!auth) return <LoginScreen onLogin={handleLogin} />;

  return (
    <div>
      <div className="header">
        <div className="wrap header-inner">
          <div>
            <h1>Suivi Qualité — TERSEA Madagascar</h1>
            <p>Débriefings managers · Reporting · Compte Auchan · Site Mada</p>
          </div>
          <div className="status" style={{display:"flex", alignItems:"center", gap:10}}>
            <span>💾 {statusLabel}</span>
            <span style={{opacity:0.85}}>· {auth.label} ({auth.username})</span>
            <button className="btn" style={{padding:"3px 10px", fontSize:12}} onClick={handleLogout}>Se déconnecter</button>
          </div>
        </div>
      </div>

      {connStatus === "unconfigured" && (
        <div className="wrap" style={{paddingTop:14}}>
          <div className="notice warn">
            <span className="ic">⚠</span>
            <div>
              Firebase n'est pas encore configuré : les données sont conservées uniquement dans <strong>ce
              navigateur</strong>, pas partagées avec les autres. Suis les étapes du fichier <code>README.md</code>
              (créer un projet Firebase gratuit, activer Firestore, coller la config en haut du fichier HTML) pour
              activer le partage en ligne entre utilisateurs.
            </div>
          </div>
        </div>
      )}
      {connStatus === "error" && (
        <div className="wrap" style={{paddingTop:14}}>
          <div className="notice warn">
            <span className="ic">⚠</span>
            <div>Impossible de se connecter à Firebase ({connError || "erreur inconnue"}). Vérifie la configuration
            et les règles Firestore (fichier <code>firestore.rules</code>). En attendant, les modifications restent
            en mémoire locale et seront perdues à la fermeture de la page.</div>
          </div>
        </div>
      )}

      <div className="tabs">
        <div className="wrap tabs-inner">
          {tabs.map((t) => (
            <button key={t.id} className={"tab-btn" + (tab===t.id ? " active" : "")} onClick={() => setTab(t.id)}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>

      <div className="wrap content">
        {tab === "reporting" && <ReportingView ecarts={ecarts} weekly={weekly} roster={roster} allEvaluations={allEvaluations} />}
        {tab === "performance" && <PerformanceView ecarts={ecarts} weekly={weekly} roster={roster} allEvaluations={allEvaluations} />}
        {tab === "debriefing" && <DebriefingView ecarts={ecarts} setEcarts={setEcarts} weekly={weekly} onSaveNow={saveNow} roster={roster} allEvaluations={allEvaluations} />}
        {tab === "roster" && auth.role === "admin" && <RosterView roster={roster} setRoster={setRoster} />}
        {tab === "nps" && <NPSView nccResponses={nccResponses} roster={roster} />}
        {tab === "import" && auth.role === "admin" && <ImportView ecarts={ecarts} setEcarts={setEcarts} onImportJSON={importFromJSON} roster={roster} setRoster={setRoster} nccResponses={nccResponses} setNccResponses={setNccResponses} allEvaluations={allEvaluations} setAllEvaluations={setAllEvaluations} />}
        {tab === "export" && auth.role === "admin" && <ExportView ecarts={ecarts} weekly={weekly} roster={roster} nccResponses={nccResponses} allEvaluations={allEvaluations} />}
      </div>

      <div className="footer">
        TERSEA · Site Mada · Compte Auchan — {connStatus === "ok" ? "données partagées en ligne via Firebase" : "voir README.md pour activer le partage en ligne"}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
