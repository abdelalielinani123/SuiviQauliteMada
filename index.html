/* Correspondance semaine -> mois, déduite des dates réelles (S19 = semaine du 04/05/2026) */
const WEEK_TO_MONTH = {
  S19: "Mai", S20: "Mai", S21: "Mai", S22: "Mai",
  S23: "Juin", S24: "Juin", S25: "Juin", S26: "Juin",
  S27: "Juillet", S28: "Juillet",
};
const MONTH_ORDER = ["Mai", "Juin", "Juillet"];

function extractWeekCode(semaineStr){
  if (!semaineStr) return null;
  const m = String(semaineStr).match(/S\d+/);
  return m ? m[0] : null;
}
function weekToMonth(semaineStr){
  const code = extractWeekCode(semaineStr);
  return code ? (WEEK_TO_MONTH[code] || null) : null;
}
// Numéro de semaine ISO (1-53) pour une date donnée (utilisé pour les données datées au jour près, ex: réponses NCC)
function getISOWeekLabel(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}
function getMonthLabel(dateStr){
  if (!dateStr) return null;
  const d = new Date(dateStr);
  if (isNaN(d)) return null;
  const noms = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
  return noms[d.getMonth()];
}
function computeMonthly(weekly){
  return MONTH_ORDER.map((mois) => {
    const rows = weekly.filter((w) => WEEK_TO_MONTH[w.semaine] === mois);
    const row = { mois };
    INDICATEURS.forEach((ind) => {
      const vals = rows.map((r) => r[ind]).filter((v) => v !== null && v !== undefined);
      row[ind] = vals.length ? Math.round((vals.reduce((a,b) => a+b, 0)/vals.length) * 10)/10 : null;
    });
    return row;
  }).filter((row) => INDICATEURS.some((ind) => row[ind] !== null));
}
function computeDaily(ecarts){
  const map = {};
  ecarts.forEach((e) => {
    if (!e.date) return;
    map[e.date] = (map[e.date] || 0) + 1;
  });
  return Object.keys(map).sort().map((date) => ({ date, count: map[date] }));
}

function normalizeName(str){
  if (!str) return "";
  return String(str).trim().split(/\s+/)[0].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function findRosterEntry(conseiller, roster){
  const key = normalizeName(conseiller);
  if (!key || !roster || !roster.length) return null;
  return roster.find((r) => normalizeName(r.conseiller) === key) || null;
}

function getConseillerStatus(conseiller, roster){
  const entry = findRosterEntry(conseiller, roster);
  if (!entry) return "Non renseigné";
  if (entry.statut === "Nouveau" || entry.statut === "Ancien" || entry.statut === "Départ") return entry.statut;
  if (entry.dateEntreeProd) {
    const d = new Date(entry.dateEntreeProd);
    if (!isNaN(d)) {
      const days = (Date.now() - d.getTime()) / 86400000;
      return days <= NOUVEAU_ANCIEN_SEUIL_JOURS ? "Nouveau" : "Ancien";
    }
  }
  return "Non renseigné";
}

function getConseillerManagerFromRoster(conseiller, roster){
  const entry = findRosterEntry(conseiller, roster);
  return entry ? entry.manager : null;
}

// Le manager "effectif" d'un écart : si le champ manager de l'écart est un vrai nom déjà résolu,
// on le respecte (il a pu être corrigé manuellement) ; sinon (Non trouvé / À confirmer / vide),
// on retombe sur la répartition d'équipe si elle permet de trancher.
function getEffectiveManager(e, roster){
  if (e.manager && e.manager !== "Non trouvé" && e.manager !== "À confirmer") return e.manager;
  const rosterMgr = getConseillerManagerFromRoster(e.conseiller, roster);
  if (rosterMgr && rosterMgr !== "RAS") return rosterMgr;
  return e.manager || "Non trouvé";
}

function getRosterConseillerList(roster){
  const seen = new Map();
  (roster || []).forEach((r) => {
    const key = normalizeName(r.conseiller);
    if (key && !seen.has(key)) seen.set(key, r);
  });
  return [...seen.values()];
}

function displayConseillerName(rosterConseillerField){
  return String(rosterConseillerField).split(" TER_")[0].split(" PST32")[0].trim();
}

function normalizeDateStr(d){
  if (!d) return "";
  const parsed = new Date(d);
  if (isNaN(parsed)) return "";
  return parsed.toISOString().slice(0,10);
}

/* Détecte, directement à partir des évaluations brutes (toutes_evaluations), les cas en écart
   (sous l'objectif ou KO) qui n'ont pas encore été saisis manuellement dans le Suivi débriefing.
   Complète la liste manuelle 'ecarts' sans prétendre s'y substituer : ce sont des alertes
   "à vérifier / pas encore dispatchées", identifiées par un simple rapprochement conseiller+jour+indicateur. */
function computeAutoDetectedEcarts(allEvaluations, ecarts, roster, windowDays=14){
  if (!allEvaluations || allEvaluations.length === 0) return [];
  const knownKeys = new Set((ecarts || []).map((e) => `${e.indicateur}|${normalizeName(e.conseiller)}|${e.date}`));
  const todayStr = new Date().toISOString().slice(0,10);
  const cutoffStr = new Date(Date.now() - windowDays*86400000).toISOString().slice(0,10);
  const out = [];
  let autoId = 1;
  allEvaluations.forEach((ev) => {
    // Fenêtre de récence : ne remonte que les évaluations récentes (pas tout l'historique non audité),
    // et ignore les dates aberrantes (erreurs de parsing Excel donnant des dates dans le futur lointain).
    if (!ev.date || ev.date < cutoffStr || ev.date > todayStr) return;
    const obj = OBJECTIFS[ev.indicateur];
    if (obj === undefined) return;
    const isNumeric = ev.indicateur === "Hubicus Voix" || ev.indicateur === "Hubicus Mail" || ev.indicateur.includes("NCC");
    let ecartLabel = "";
    if (isNumeric) {
      if (ev.score === null || ev.score === undefined || ev.score === "") return;
      if (Number(ev.score) >= obj) return;
      ecartLabel = ev.indicateur.includes("NCC")
        ? `Note client = ${ev.score}/10 (objectif ${obj}/10)`
        : `Note = ${ev.score}% (objectif ${obj}%)`;
    } else {
      if (ev.statut !== "KO") return; // seuls les KO avérés sont remontés (les SI restent à l'appréciation manuelle)
      ecartLabel = `Statut = KO (objectif ${obj}%)`;
    }
    const conseillerDisplay = displayConseillerName(ev.conseiller);
    const key = `${ev.indicateur}|${normalizeName(conseillerDisplay)}|${ev.date}`;
    if (knownKeys.has(key)) return;
    const mgr = getConseillerManagerFromRoster(ev.conseiller, roster) || "Non trouvé";
    out.push({
      id: `auto-${autoId++}`,
      indicateur: ev.indicateur,
      conseiller: conseillerDisplay,
      reference: "",
      semaine: ev.semaine,
      date: ev.date,
      ecart: ecartLabel,
      statut: "Non dispatché",
      action: "",
      dateDebrief: "",
      constat: "",
      managerDispatch: mgr,
      manager: mgr,
      alerte: "",
      autoDetected: true,
    });
  });
  return out.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
}

function parseNCCRows(rows){
  const groups = {};
  rows.forEach((r) => {
    const key = String(r["N° Demande"] ?? r["N Demande"] ?? r["N° demande"] ?? "").trim();
    if (!key || key === "nan") return;
    if (!groups[key]) groups[key] = { ndemande: key, conseillerFull: r["Conseiller"] || "", date: r["Date de L'enquête"] || r["Date de l'enquête"] || "" };
    const q = String(r["Question"] || "").trim();
    const rep = r["Réponse"];
    if (q.startsWith("1.")) groups[key].scoreNCC = rep;
    else if (q.startsWith("2.")) groups[key].motif = rep;
    else if (q.startsWith("4.")) groups[key].scoreNPS = rep;
    else if (q.startsWith("5.")) groups[key].verbatim = rep;
  });
  return Object.values(groups)
    .filter((g) => g.conseillerFull)
    .map((g) => {
      const ncc = g.scoreNCC !== undefined && g.scoreNCC !== "" && !isNaN(Number(g.scoreNCC)) ? Number(g.scoreNCC) : null;
      const nps = g.scoreNPS !== undefined && g.scoreNPS !== "" && !isNaN(Number(g.scoreNPS)) ? Number(g.scoreNPS) : null;
      return {
        ndemande: g.ndemande,
        conseillerFull: g.conseillerFull,
        conseiller: displayConseillerName(g.conseillerFull),
        date: normalizeDateStr(g.date),
        scoreNCC: ncc,
        scoreNPS: nps,
        motif: g.motif || "",
        verbatim: g.verbatim || "",
      };
    });
}

function computeAggregateNPS(rows){
  const withScore = rows.filter((r) => r.scoreNPS !== null);
  if (!withScore.length) return null;
  const promoters = withScore.filter((r) => r.scoreNPS >= 9).length;
  const detracteurs = withScore.filter((r) => r.scoreNPS <= 6).length;
  return Math.round(((promoters - detracteurs) / withScore.length) * 1000) / 10;
}

function computeConseillerBreakdown(ecarts, roster, visibleIndicators){
  const list = getRosterConseillerList(roster);
  return list
    .filter((r) => r.manager !== "RAS") // on exclut les conseillers partis (pas de manager actif)
    .map((r) => {
      const matching = ecarts.filter((e) =>
        normalizeName(e.conseiller) === normalizeName(r.conseiller) && visibleIndicators.has(e.indicateur)
      );
      const done = matching.filter((e) => e.statut === "OK" || e.statut === "KO").length;
      const indicateursTouches = [...new Set(matching.map((e) => e.indicateur))];
      return {
        conseiller: displayConseillerName(r.conseiller),
        manager: r.manager,
        statutEquipe: r.statut,
        total: matching.length,
        done,
        indicateursTouches,
      };
    });
}

function computeTeamBreakdown(conseillerBreakdown){
  const map = {};
  conseillerBreakdown.forEach((c) => {
    const key = c.manager || "Non trouvé";
    if (!map[key]) map[key] = { manager: key, total: 0, done: 0, nbConseillers: 0, nbEnEcart: 0 };
    map[key].total += c.total;
    map[key].done += c.done;
    map[key].nbConseillers += 1;
    if (c.total > 0) map[key].nbEnEcart += 1;
  });
  return Object.values(map).sort((a, b) => b.total - a.total);
}

function uid(){ return Date.now() + Math.floor(Math.random()*100000); }

async function waitForFirebase(){
  let tries = 0;
  while (!window.__firebaseReady && tries < 200) {
    await new Promise((r) => setTimeout(r, 25));
    tries++;
  }
}

async function fsLoad(key, fallback){
  await waitForFirebase();
  if (!window.__firebaseConfigured) return { value: fallback, status: "unconfigured" };
  if (window.__firebaseError || !window.__fb) return { value: fallback, status: "error", error: window.__firebaseError };
  try {
    const ref = window.__fb.doc(window.__fb.db, "dashboard", key);
    const snap = await window.__fb.getDoc(ref);
    if (snap.exists() && snap.data().payload) return { value: snap.data().payload, status: "ok" };
    return { value: fallback, status: "ok" };
  } catch (e) {
    return { value: fallback, status: "error", error: e.message };
  }
}

async function fsSave(key, value){
  if (!window.__firebaseConfigured || window.__firebaseError || !window.__fb) return false;
  try {
    const ref = window.__fb.doc(window.__fb.db, "dashboard", key);
    await window.__fb.setDoc(ref, { payload: value, updatedAt: new Date().toISOString() });
    return true;
  } catch (e) {
    return false;
  }
}

function fsSubscribe(key, onChange){
  if (!window.__firebaseConfigured || window.__firebaseError || !window.__fb) return () => {};
  try {
    const ref = window.__fb.doc(window.__fb.db, "dashboard", key);
    return window.__fb.onSnapshot(ref, (snap) => {
      if (snap.exists() && snap.data().payload) onChange(snap.data().payload);
    });
  } catch (e) {
    return () => {};
  }
}

    const rows = ecarts.filter((e) => e.indicateur === ind);
    const done = rows.filter((r) => r.statut === "OK" || r.statut === "KO").length;
    return { indicateur: ind, total: rows.length, done, taux: rows.length ? Math.round((done/rows.length)*1000)/10 : 0 };
  });
}
function computeManagerStats(ecarts, roster){
  return MANAGERS.map((m) => {
    const rows = ecarts.filter((e) => getEffectiveManager(e, roster) === m);
    const done = rows.filter((r) => r.statut === "OK" || r.statut === "KO").length;
    return { manager: m, total: rows.length, done, taux: rows.length ? Math.round((done/rows.length)*1000)/10 : 0 };
  }).filter((m) => m.total > 0);
}
function downloadBlob(content, filename, type){
  const blob = new Blob([content], { type });

  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function BarChartV({ data, labelKey, valueKey, height=250 }) {
  const W = 640, H = height, padB = 70, padT = 24, padL = 10, padR = 10;
  const innerH = H - padB - padT;
  const bw = (W - padL - padR) / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height}}>
      <line x1={padL} y1={H-padB} x2={W-padR} y2={H-padB} stroke="var(--greyLine)" />
      {[0,25,50,75,100].map((g) => (
        <line key={g} x1={padL} x2={W-padR} y1={H-padB-(g/100)*innerH} y2={H-padB-(g/100)*innerH} stroke="#EFEDEF" />
      ))}
      {data.map((d, i) => {
        const val = d[valueKey] || 0;
        const barH = (val/100) * innerH;
        const x = padL + i*bw + bw*0.15;
        const w = bw*0.7;
        const y = H - padB - barH;
        return (
          <g key={i}>
            <rect x={x} y={y} width={w} height={barH} rx="4" fill={barColor(val)} />
            <text x={x+w/2} y={y-6} fontSize="11" fontWeight="700" textAnchor="middle" fill="#241C29">{val}%</text>
            <text x={x+w/2} y={H-padB+16} fontSize="10" textAnchor="middle" fill="#6B6270">
              {String(d[labelKey]).length > 14 ? String(d[labelKey]).slice(0,13)+"…" : d[labelKey]}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

    let d = "";

    data.forEach((row, i) => {
      const v = row[key];
      if (v === null || v === undefined) { started = false; return; }
      const cmd = started ? "L" : "M";
      d += `${cmd}${xFor(i)},${yFor(v)} `;
      started = true;
    });
    return d.trim();
  }

  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height}}>
        {[0,25,50,75,100].map((g) => (
          <g key={g}>
            <line x1={padL} x2={W-padR} y1={yFor(g)} y2={yFor(g)} stroke="#EFEDEF" />
            <text x={2} y={yFor(g)+3} fontSize="9" fill="#6B6270">{g}</text>
          </g>
        ))}
        {series.map((s) => (
          <path key={s.key} d={pathFor(s.key)} fill="none" stroke={s.color} strokeWidth="2.2" />
        ))}
        {series.map((s) => data.map((row, i) => {
          const v = row[s.key];
          if (v === null || v === undefined) return null;
          return <circle key={s.key+i} cx={xFor(i)} cy={yFor(v)} r="2.6" fill={s.color} />;
        }))}
        {series.map((s) => data.map((row, i) => {
          const v = row[s.key];
          if (v === null || v === undefined) return null;
          const label = s.key.includes("NCC") ? (v/10).toFixed(1) : (Number.isInteger(v) ? v : v.toFixed(1)) + "%";
          return (
            <text key={"lbl"+s.key+i} x={xFor(i)} y={yFor(v)-7} fontSize="8.5" fontWeight="600" textAnchor="middle" fill={s.color}>
              {label}
            </text>
          );
        }))}
        {data.map((row, i) => (
          <text key={i} x={xFor(i)} y={H-padB+16} fontSize="10" textAnchor="middle" fill="#6B6270">{row[xKey]}</text>
        ))}
      </svg>
      <div style={{display:"flex", flexWrap:"wrap", gap:"10px 16px", marginTop:8, justifyContent:"center"}}>
        {series.map((s) => (
          <div key={s.key} style={{display:"flex", alignItems:"center", gap:5, fontSize:11, color:"#6B6270"}}>
            <span style={{width:10, height:10, borderRadius:99, background:s.color, display:"inline-block"}}></span>
            {s.key}
          </div>
        ))}
      </div>
      <p style={{fontSize:11, color:"#6B6270", marginTop:8}}>
        NCC (note /10) affiché ×10 sur la même échelle pour comparaison visuelle — voir le tableau détaillé pour la valeur exacte.
      </p>
    </div>
  );
}

function DayCountChart({ data, height=260 }) {
  if (!data.length) {
    return <p style={{fontSize:13, color:"var(--textMuted)"}}>Aucun écart avec une date exploitable sur la période sélectionnée.</p>;
  }
  const W = 700, H = height, padL = 30, padR = 10, padT = 20, padB = 60;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const max = Math.max(...data.map((d) => d.count), 4);
  const bw = innerW / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height}}>
      <line x1={padL} x2={W-padR} y1={H-padB} y2={H-padB} stroke="var(--greyLine)" />
      {data.map((d, i) => {
        const barH = (d.count/max) * innerH;
        const x = padL + i*bw + bw*0.15;
        const w = bw*0.7;
        const y = H - padB - barH;
        return (
          <g key={d.date}>
            <rect x={x} y={y} width={w} height={barH} rx="3" fill="#96408F" />
            <text x={x+w/2} y={y-5} fontSize="10" fontWeight="700" textAnchor="middle" fill="#241C29">{d.count}</text>
            <text x={x+w/2} y={H-padB+14} fontSize="9" textAnchor="middle" fill="#6B6270" transform={`rotate(-40 ${x+w/2} ${H-padB+14})`}>
              {d.date.slice(5)}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

/* Vrai si la date (YYYY-MM-DD) tombe dans la plage [start, end] ; bornes vides = illimité de ce côté */
function dateInRange(dateStr, range){
  if (!dateStr || !range) return true;
  if (range.start && dateStr < range.start) return false;
  if (range.end && dateStr > range.end) return false;
  return true;
}

/* Sélecteur multi-choix générique (managers, périodes, etc.) — tableau vide = "Tous" */
function MultiSelectDropdown({ label, options, selected, setSelected, allLabel="Tous" }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);
  useEffect(() => {
    function onClick(ev){ if (ref.current && !ref.current.contains(ev.target)) setOpen(false); }
    document.addEventListener("mousedown", onClick);
    return () => document.removeEventListener("mousedown", onClick);
  }, []);
  const allSelected = !selected || selected.length === 0;
  function toggle(opt){
    setSelected((prev) => (prev||[]).includes(opt) ? (prev||[]).filter((x) => x !== opt) : [...(prev||[]), opt]);
  }
  const summary = allSelected ? allLabel : (selected.length === 1 ? selected[0] : `${selected.length} sélectionnés`);
  return (
    <span ref={ref} style={{position:"relative", display:"inline-block"}}>
      {label && <span style={{fontSize:12, color:"var(--textMuted)", fontWeight:600, marginRight:6}}>{label}</span>}
      <button type="button" className="btn" onClick={() => setOpen((o) => !o)} style={{minWidth:110, textAlign:"left"}}>
        {summary} <span style={{opacity:0.6}}>▾</span>
      </button>
      {open && (
        <div style={{position:"absolute", zIndex:30, top:"100%", left:0, marginTop:4, background:"#fff", border:"1px solid var(--greyLine)", borderRadius:8, padding:8, minWidth:210, maxHeight:260, overflowY:"auto", boxShadow:"0 6px 20px rgba(0,0,0,0.14)"}}>
          <label style={{display:"flex", alignItems:"center", gap:6, fontSize:13, padding:"4px 2px", cursor:"pointer", fontWeight:600}}>
            <input type="checkbox" checked={allSelected} onChange={() => setSelected([])} /> {allLabel}
          </label>
          <div style={{borderTop:"1px solid var(--greyLine)", margin:"4px 0"}} />
          {options.map((o) => (
            <label key={o} style={{display:"flex", alignItems:"center", gap:6, fontSize:13, padding:"4px 2px", cursor:"pointer"}}>
              <input type="checkbox" checked={!allSelected && selected.includes(o)} onChange={() => toggle(o)} /> {o}
            </label>
          ))}
          {options.length === 0 && <div style={{fontSize:12, color:"var(--textMuted)", padding:"4px 2px"}}>Aucune option.</div>}
        </div>
      )}
    </span>
  );
}

function parseScoreFromEcart(e){
  if (e.indicateur === "Hubicus Voix" || e.indicateur === "Hubicus Mail") {
    const m = e.ecart.match(/Note\s*=\s*([\d.]+)%/);
    return m ? { value: parseFloat(m[1]), unit: "%" } : null;
  }
  if (e.indicateur === "NCC / Satisfaction Client") {
    const m = e.ecart.match(/Note client\s*=\s*([\d.]+)\/10/);
    return m ? { value: parseFloat(m[1]), unit: "/10" } : null;
  }
  return null; // Process Auchan/Interne, Transfert : pas de note numérique par ligne, seulement OK/KO/SI
}

function computeConseillerScoreBreakdown(ecarts, roster, kpi, allEvaluations, periodFilterFn){
  const list = getRosterConseillerList(roster).filter((r) => r.manager !== "RAS");
  const evalsForKpi = (allEvaluations || []).filter((ev) => ev.indicateur === kpi && (!periodFilterFn || periodFilterFn(ev)));
  const hasRawData = evalsForKpi.length > 0;
  const isNumericKpi = kpi === "Hubicus Voix" || kpi === "Hubicus Mail" || kpi.includes("NCC");

  return list.map((r) => {
    const matchingEcarts = ecarts.filter((e) =>
      normalizeName(e.conseiller) === normalizeName(r.conseiller) && e.indicateur === kpi
    );
    const done = matchingEcarts.filter((e) => e.statut === "OK" || e.statut === "KO").length;

    let avgScore = null, unit = kpi.includes("NCC") ? "/10" : "%", nbEval = 0;
    if (hasRawData) {
      const mine = evalsForKpi.filter((ev) => normalizeName(ev.conseiller) === normalizeName(r.conseiller));
      nbEval = mine.length;
      if (mine.length) {
        if (isNumericKpi) {
          const withScore = mine.filter((ev) => ev.score !== null && ev.score !== undefined && ev.score !== "");
          avgScore = withScore.length ? Math.round((withScore.reduce((a,b) => a+Number(b.score), 0)/withScore.length)*10)/10 : null;
        } else {
          const withStatut = mine.filter((ev) => ["OK","KO","SI"].includes(ev.statut));
          const ok = withStatut.filter((ev) => ev.statut === "OK").length;
          avgScore = withStatut.length ? Math.round((ok/withStatut.length)*1000)/10 : null;
        }
      }
    } else {
      const scores = matchingEcarts.map(parseScoreFromEcart).filter(Boolean);
      avgScore = scores.length ? Math.round((scores.reduce((a, b) => a + b.value, 0) / scores.length)*10)/10 : null;
      if (scores.length) unit = scores[0].unit;
    }

    return {
      conseiller: displayConseillerName(r.conseiller),
      manager: r.manager,
      statutEquipe: r.statut,
      total: matchingEcarts.length,
      done,
      avgScore, unit, nbEval,
      hasRawData,
    };
  });
}

function computeTeamScoreBreakdown(conseillerScoreBreakdown, isNumericKpi){
  const map = {};
  conseillerScoreBreakdown.forEach((c) => {
    const key = c.manager || "Non trouvé";
    if (!map[key]) map[key] = { manager: key, total: 0, done: 0, nbConseillers: 0, nbEnEcart: 0, scores: [], nbEvalTotal: 0, okTotal: 0, unit: c.unit };
    map[key].total += c.total;
    map[key].done += c.done;
    map[key].nbConseillers += 1;
    if (c.total > 0) map[key].nbEnEcart += 1;
    if (c.avgScore !== null) {
      map[key].scores.push(c.avgScore);
      map[key].nbEvalTotal += c.nbEval || 1;
    }
  });
  return Object.values(map).map((t) => ({
    ...t,
    avgScore: t.scores.length ? Math.round((t.scores.reduce((a,b) => a+b, 0)/t.scores.length)*10)/10 : null,
  })).sort((a, b) => b.total - a.total);
}

function extractWeekNum(code){
  const m = code && String(code).match(/S(\d+)/);
  return m ? parseInt(m[1], 10) : 999;
}

/* Calcule la tendance d'un KPI, filtrée par manager(s) et par la période choisie (jour/semaine/mois/plage) —
   alimente le graphique dynamique du bloc "Résultats par conseiller et par équipe".
   La granularité de regroupement (jour vs semaine) s'adapte au filtre actif, pour que les périodes
   courtes (2-3 jours) affichent bien plusieurs points au lieu d'être noyées dans un seul point hebdomadaire. */
function computeKpiTrend(ecarts, allEvaluations, kpi, managers, roster, periodCtx){
  const { granBreakdown="tous", periodBreakdown=[], dateRange=null } = periodCtx || {};
  const evalsForKpi = (allEvaluations || []).filter((ev) => ev.indicateur === kpi);
  const hasRawData = evalsForKpi.length > 0;
  const isNumericKpi = kpi === "Hubicus Voix" || kpi === "Hubicus Mail" || kpi.includes("NCC");
  const byDay = granBreakdown === "jour" || granBreakdown === "plage";
  const bucket = {};

  function inManagerScope(conseillerFull){
    if (!managers || managers.length === 0) return true;
    return managers.includes(getConseillerManagerFromRoster(conseillerFull, roster));
  }
  function inPeriod(dateStr, semaineStr){
    if (granBreakdown === "plage") return dateInRange(dateStr, dateRange);
    if (granBreakdown === "tous" || periodBreakdown.length === 0) return true;
    if (granBreakdown === "jour") return periodBreakdown.includes(dateStr);
    if (granBreakdown === "semaine") return periodBreakdown.includes(extractWeekCode(semaineStr));
    if (granBreakdown === "mois") return periodBreakdown.includes(weekToMonth(semaineStr));
    return true;
  }
  function bucketKey(dateStr, semaineStr){
    return byDay ? dateStr : extractWeekCode(semaineStr);
  }
  function ensure(key){
    if (!bucket[key]) bucket[key] = { key, sum:0, count:0, ok:0, total:0 };
    return bucket[key];
  }

  if (hasRawData) {
    evalsForKpi.forEach((ev) => {
      if (!inManagerScope(ev.conseiller)) return;
      if (!inPeriod(ev.date, ev.semaine)) return;
      const key = bucketKey(ev.date, ev.semaine);
      if (!key) return;
      const b = ensure(key);
      if (isNumericKpi) {
        if (ev.score !== null && ev.score !== undefined && ev.score !== "") { b.sum += Number(ev.score); b.count += 1; }
      } else if (["OK","KO","SI"].includes(ev.statut)) {
        b.total += 1; if (ev.statut === "OK") b.ok += 1;
      }
    });
  } else {
    ecarts.filter((e) => e.indicateur === kpi).forEach((e) => {
      if (managers && managers.length > 0 && !managers.includes(getEffectiveManager(e, roster))) return;
      if (!inPeriod(e.date, e.semaine)) return;
      const key = bucketKey(e.date, e.semaine);
      if (!key) return;
      const parsed = parseScoreFromEcart(e);
      if (!parsed) return;
      const b = ensure(key);
      b.sum += parsed.value; b.count += 1;
    });
  }

  const rows = Object.values(bucket)
    .map((b) => ({ label: b.key, score: isNumericKpi ? (b.count ? Math.round((b.sum/b.count)*10)/10 : null) : (b.total ? Math.round((b.ok/b.total)*1000)/10 : null) }))
    .filter((b) => b.score !== null);
  return byDay ? rows.sort((a,b) => a.label.localeCompare(b.label)) : rows.sort((a,b) => extractWeekNum(a.label) - extractWeekNum(b.label));
}

    [ecartsManagerFiltered, visibleIndicators]
  );
  const daily = useMemo(() => computeDaily(filteredEcartsForDaily), [filteredEcartsForDaily]);

  const managerOptions = useMemo(() => {
    const set = new Set((roster || []).map((r) => r.manager).filter((m) => m && m !== "RAS"));
    return [...set].sort();
  }, [roster]);
  const conseillerOptions = useMemo(() => {
    return getRosterConseillerList(roster)
      .filter((r) => r.manager !== "RAS")
      .filter((r) => fManager.length === 0 || fManager.includes(r.manager))
      .map((r) => displayConseillerName(r.conseiller))
      .sort();
  }, [roster, fManager]);

  const weekOptionsB = useMemo(() => {
    const set = new Set(ecarts.map((e) => extractWeekCode(e.semaine)).filter(Boolean));
    (allEvaluations||[]).forEach((e) => { const c = extractWeekCode(e.semaine); if (c) set.add(c); });
    return [...set].sort();
  }, [ecarts, allEvaluations]);
  const monthOptionsB = useMemo(() => {
    const set = new Set(ecarts.map((e) => weekToMonth(e.semaine)).filter(Boolean));
    (allEvaluations||[]).forEach((e) => { const m = weekToMonth(e.semaine); if (m) set.add(m); });
    return MONTH_ORDER.filter((m) => set.has(m));
  }, [ecarts, allEvaluations]);
  const dayOptionsB = useMemo(() => {
    const set = new Set(ecarts.map((e) => e.date).filter(Boolean));
    (allEvaluations||[]).forEach((e) => { if (e.date) set.add(e.date); });
    return [...set].sort();
  }, [ecarts, allEvaluations]);

  const ecartsForBreakdown = useMemo(() => {
    return ecarts.filter((e) => {
      if (granBreakdown === "plage") return dateInRange(e.date, dateRangeBreakdown);
      if (granBreakdown !== "tous" && periodBreakdown.length > 0) {
        if (granBreakdown === "semaine" && !periodBreakdown.includes(extractWeekCode(e.semaine))) return false;
        if (granBreakdown === "mois" && !periodBreakdown.includes(weekToMonth(e.semaine))) return false;
        if (granBreakdown === "jour" && !periodBreakdown.includes(e.date)) return false;
      }
      return true;
    });
  }, [ecarts, granBreakdown, periodBreakdown, dateRangeBreakdown]);

  const evalPeriodFilterFn = useMemo(() => {
    if (granBreakdown === "plage") return (ev) => dateInRange(ev.date, dateRangeBreakdown);
    if (granBreakdown === "tous" || periodBreakdown.length === 0) return null;
    return (ev) => {
      if (granBreakdown === "semaine") return periodBreakdown.includes(extractWeekCode(ev.semaine));
      if (granBreakdown === "mois") return periodBreakdown.includes(weekToMonth(ev.semaine));
      if (granBreakdown === "jour") return periodBreakdown.includes(ev.date);
      return true;
    };
  }, [granBreakdown, periodBreakdown, dateRangeBreakdown]);

  /* Tendance du KPI sélectionné, sur la période et le(s) manager(s) filtrés — alimente le graphique dynamique.
     La granularité (jour vs semaine) s'adapte au filtre actif (voir computeKpiTrend). */
  const kpiTrend = useMemo(
    () => computeKpiTrend(ecarts, allEvaluations, kpiFilter, fManager, roster, { granBreakdown, periodBreakdown, dateRange: dateRangeBreakdown }),
    [ecarts, allEvaluations, kpiFilter, fManager, roster, granBreakdown, periodBreakdown, dateRangeBreakdown]
  );

  const conseillerBreakdownAll = useMemo(
    () => computeConseillerScoreBreakdown(ecartsForBreakdown, roster, kpiFilter, allEvaluations, evalPeriodFilterFn),
    [ecartsForBreakdown, roster, kpiFilter, allEvaluations, evalPeriodFilterFn]
  );
  const objectifKpi = `${OBJECTIFS[kpiFilter]}${kpiFilter.includes("NCC") ? "/10" : "%"}`;
  const kpiHasNumericScore = kpiFilter === "Hubicus Voix" || kpiFilter === "Hubicus Mail" || kpiFilter.includes("NCC");

  function isEnEcart(c){
    if (c.hasRawData) return c.avgScore !== null && c.avgScore < OBJECTIFS[kpiFilter];
    return c.total > 0;
  }

  const conseillerBreakdown = useMemo(() => conseillerBreakdownAll.filter((c) => {
    if (fManager.length > 0 && !fManager.includes(c.manager)) return false;
    if (fConseiller !== "Tous" && c.conseiller !== fConseiller) return false;
    if (onlyEnEcart && !isEnEcart(c)) return false;
    return true;
  }).sort((a, b) => (a.avgScore ?? 999) - (b.avgScore ?? 999)), [conseillerBreakdownAll, fManager, fConseiller, onlyEnEcart, kpiFilter]);
  const teamBreakdown = useMemo(() => computeTeamScoreBreakdown(conseillerBreakdownAll.filter((c) => {
    if (fManager.length > 0 && !fManager.includes(c.manager)) return false;
    return true;
  })), [conseillerBreakdownAll, fManager]);

  const hasRawDataForKpi = conseillerBreakdownAll.some((c) => c.hasRawData);

  function toggleIndicator(key){
    setVisibleIndicators((prev) => {
      const next = new Set(prev);
      if (next.has(key)) { if (next.size > 1) next.delete(key); } else next.add(key);
      return next;
    });
  }

  const granOptions = [
    { id: "jour", label: "Jour" },
    { id: "semaine", label: "Semaine" },
    { id: "mois", label: "Mois" },
  ];

  return (
    <div>
      <SectionTitle icon="📈">Suivi de la performance</SectionTitle>

      <div className="filters" style={{marginBottom:12}}>
        <span style={{fontSize:12, color:"var(--textMuted)", fontWeight:600}}>Vue :</span>
        {granOptions.map((g) => (
          <button
            key={g.id}
            className="btn"
            style={granularity === g.id ? { background:"var(--purple)", color:"#fff", borderColor:"var(--purple)" } : {}}
            onClick={() => setGranularity(g.id)}
          >
            {g.label}
          </button>
        ))}
      </div>

      <div className="filters" style={{marginBottom:16}}>
        <span style={{fontSize:12, color:"var(--textMuted)", fontWeight:600}}>Indicateurs affichés :</span>
        {INDICATEURS.map((k, i) => (
          <button
            key={k}
            className="btn"
            style={visibleIndicators.has(k) ? { background:SERIES_COLORS[i], color:"#fff", borderColor:SERIES_COLORS[i] } : { color:"var(--textMuted)" }}
            onClick={() => toggleIndicator(k)}
          >
            {k}
          </button>
        ))}
      </div>

      <div className="filters" style={{marginBottom:16}}>
        <MultiSelectDropdown label="Manager :" options={managerOptions} selected={fManager} setSelected={(v) => { setFManager(v); setFConseiller("Tous"); }} />
        {fManager.length > 0 && (
          <span style={{fontSize:11, color:"var(--textMuted)"}}>
            (s'applique à la vue Jour ci-dessous ; les vues Semaine et Mois restent globales, non disponibles par manager)
          </span>
        )}
      </div>

      {granularity === "semaine" && (
        <div className="card">
          <div style={{fontSize:13, fontWeight:600, color:"var(--purpleDark)", marginBottom:10}}>
            Évolution des résultats par semaine (S19 à S28)
          </div>
          <LineChartMulti data={weekly} series={series} xKey="semaine" />
        </div>
      )}

      {granularity === "mois" && (
        <div className="card">
          <div style={{fontSize:13, fontWeight:600, color:"var(--purpleDark)", marginBottom:10}}>
            Évolution des résultats par mois (moyenne des semaines disponibles)
          </div>
          <LineChartMulti data={monthly} series={series} xKey="mois" />
          <div className="notice info" style={{marginTop:14}}>
            <span className="ic">ℹ</span>
            <div>Chaque point mensuel est la moyenne des semaines disponibles sur ce mois (Mai = S19-S22,
            Juin = S23-S26, Juillet = S27-S28 à ce jour). Un indicateur sans donnée sur tout le mois n'apparaît pas.</div>
          </div>
        </div>
      )}

      {granularity === "jour" && (
        <div className="card">
          <div style={{fontSize:13, fontWeight:600, color:"var(--purpleDark)", marginBottom:10}}>
            Nombre d'évaluations en écart constatées par jour
          </div>
          <DayCountChart data={daily} />
          <div className="notice info" style={{marginTop:14}}>
            <span className="ic">ℹ</span>
            <div>Vue par jour = volume d'écarts constatés (comptage), et non un taux de conformité : les fichiers
            source ne fournissent un taux calculé qu'à la semaine. Seules les lignes avec une date renseignée et un
            indicateur sélectionné ci-dessus apparaissent ici ({filteredEcartsForDaily.filter((e) => e.date).length}/{filteredEcartsForDaily.length} lignes datées).</div>
          </div>
        </div>
      )}

      <div style={{marginTop:28}}>
        <SectionTitle icon="🧑‍🤝‍🧑">Résultats par conseiller et par équipe</SectionTitle>

        <div className="filters" style={{marginBottom:10}}>
          <span style={{fontSize:12, color:"var(--textMuted)", fontWeight:600}}>KPI :</span>
          <select value={kpiFilter} onChange={(e) => setKpiFilter(e.target.value)}>
            {INDICATEURS.map((k) => <option key={k}>{k}</option>)}
          </select>
          <MultiSelectDropdown label="Manager :" options={managerOptions} selected={fManager} setSelected={(v) => { setFManager(v); setFConseiller("Tous"); }} />
          <span style={{fontSize:12, color:"var(--textMuted)", fontWeight:600, marginLeft:8}}>Conseiller :</span>
          <select value={fConseiller} onChange={(e) => setFConseiller(e.target.value)}>
            <option>Tous</option>
            {conseillerOptions.map((c) => <option key={c}>{c}</option>)}
          </select>
        </div>

        <PeriodFilter
          granularity={granBreakdown} setGranularity={setGranBreakdown}
          value={periodBreakdown} setValue={setPeriodBreakdown}
          weekOptions={weekOptionsB} monthOptions={monthOptionsB} dayOptions={dayOptionsB}
          allowRange={true} dateRange={dateRangeBreakdown} setDateRange={setDateRangeBreakdown}
        />

        {kpiTrend.length > 0 && (
          <div className="card" style={{marginBottom:16}}>
            <div style={{fontSize:13, fontWeight:600, color:"var(--purpleDark)", marginBottom:10}}>
              Évolution de {kpiFilter} sur la période sélectionnée{fManager.length > 0 ? ` — ${fManager.join(", ")}` : ""}
            </div>
            {kpiTrend.length > 1 ? (
              <LineChartMulti
                data={kpiTrend.map((t) => ({ x: t.label, [kpiFilter]: kpiFilter.includes("NCC") ? t.score*10 : t.score }))}
                series={[{ key: kpiFilter, color: SERIES_COLORS[INDICATEURS.indexOf(kpiFilter)] || "var(--purple)" }]}
                xKey="x"
              />
            ) : (
              <div style={{fontSize:13, color:"var(--textMuted)"}}>
                Un seul point sur cette période ({kpiTrend[0].label} : {kpiFilter.includes("NCC") ? kpiTrend[0].score+"/10" : kpiTrend[0].score+"%"}) — élargis la période pour voir une évolution.
              </div>
            )}
          </div>
        )}

        <div className="filters" style={{marginBottom:10, marginTop:-8}}>
          <label style={{display:"flex", alignItems:"center", gap:6, fontSize:13, cursor:"pointer"}}>
            <input type="checkbox" checked={onlyEnEcart} onChange={(e) => setOnlyEnEcart(e.target.checked)} />
            Agents en écart de l'objectif uniquement
          </label>
        </div>

        {!roster || roster.length === 0 ? (
          <div className="notice warn" style={{marginBottom:14}}>
            <span className="ic">⚠</span>
            <div>Aucune répartition d'équipe chargée — importe-la dans l'onglet Importer pour voir les résultats par conseiller et par équipe.</div>
          </div>
        ) : (
          <div className={"notice " + (hasRawDataForKpi ? "info" : "warn")} style={{marginBottom:14}}>
            <span className="ic">{hasRawDataForKpi ? "ℹ" : "⚠"}</span>
            <div>Objectif {kpiFilter} : <strong>{objectifKpi}</strong>.{" "}
            {hasRawDataForKpi
              ? "Score calculé sur l'ensemble des évaluations importées pour cet indicateur (pas seulement celles en écart)."
              : "Aucune évaluation complète importée pour cet indicateur — le score affiché ci-dessous n'est que la moyenne des écarts déjà enregistrés (toujours sous l'objectif par construction). Importe le fichier d'évaluations complet (onglet Importer) pour un score exact par conseiller."}
            </div>
          </div>
        )}

        <div className="grid-2col" style={{display:"grid", gridTemplateColumns:"1.4fr 1fr", gap:16}}>
          <div className="card" style={{padding:0, overflow:"hidden"}}>
            <div style={{padding:"12px 14px", fontSize:13, fontWeight:600, color:"var(--purpleDark)", borderBottom:"1px solid var(--greyLine)"}}>
              Par conseiller ({conseillerBreakdown.length}) — {kpiFilter}
            </div>
            <div style={{overflowX:"auto", maxHeight:420, overflowY:"auto"}}>
              <table>
                <thead>
                  <tr>{["Conseiller","Manager","Équipe","Score","Objectif","Nb éval.","Écarts débriefés"].map((h) => <th key={h}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {conseillerBreakdown.map((c, i) => (
                    <tr key={c.conseiller+i} style={{backgroundColor: isEnEcart(c) ? "var(--redSoft)" : (i%2 ? "var(--grey)" : "#fff")}}>
                      <td>{c.conseiller}</td>
                      <td>{c.manager}</td>
                      <td style={{fontSize:12, color:"var(--textMuted)"}}>{c.statutEquipe || "—"}</td>
                      <td style={{fontWeight:600, color: isEnEcart(c) ? "var(--red)" : "var(--green)"}}>
                        {c.avgScore !== null ? `${c.avgScore}${c.unit}` : (c.hasRawData ? "—" : (c.total > 0 ? `${c.total} écart(s)` : "0 écart"))}
                      </td>
                      <td style={{fontSize:12, color:"var(--textMuted)"}}>{objectifKpi}</td>
                      <td style={{fontSize:12, color:"var(--textMuted)"}}>{c.hasRawData ? c.nbEval : "—"}</td>
                      <td>{c.total>0 ? `${c.done}/${c.total}` : "—"}</td>
                    </tr>
                  ))}
                  {conseillerBreakdown.length === 0 && (
                    <tr><td colSpan="7" style={{textAlign:"center", padding:20, color:"var(--textMuted)"}}>Aucun conseiller ne correspond à ces filtres.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          <div className="card" style={{padding:0, overflow:"hidden"}}>
            <div style={{padding:"12px 14px", fontSize:13, fontWeight:600, color:"var(--purpleDark)", borderBottom:"1px solid var(--greyLine)"}}>
              Par équipe — {kpiFilter}
            </div>
            <table>
              <thead>
                <tr>{["Manager","Conseillers en écart","Score équipe","Objectif"].map((h) => <th key={h}>{h}</th>)}</tr>
              </thead>
              <tbody>
                {teamBreakdown.map((t, i) => (
                  <tr key={t.manager} style={{backgroundColor: i%2 ? "var(--grey)" : "#fff"}}>
                    <td style={{fontWeight:500}}>{t.manager}</td>
                    <td>{t.nbEnEcart}/{t.nbConseillers}</td>
                    <td style={{fontWeight:600, color: (t.avgScore !== null ? t.avgScore < OBJECTIFS[kpiFilter] : t.total>0) ? "var(--red)" : "var(--green)"}}>
                      {t.avgScore !== null ? `${t.avgScore}${t.unit}` : (t.total > 0 ? `${t.total} écart(s)` : "0 écart")}
                    </td>
                    <td style={{fontSize:12, color:"var(--textMuted)"}}>{objectifKpi}</td>
                  </tr>
                ))}
                {teamBreakdown.length === 0 && (
                  <tr><td colSpan="4" style={{textAlign:"center", padding:20, color:"var(--textMuted)"}}>—</td></tr>
                )}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

function EcartDetailPanel({ e, onSave, onDelete, roster }) {
  const effectiveMgr = getEffectiveManager(e, roster);
  const [draft, setDraft] = useState({ statut: e.statut, action: e.action, dateDebrief: e.dateDebrief, manager: effectiveMgr });
  const [saving, setSaving] = useState(false);
  const [saveResult, setSaveResult] = useState(null); // null | {ok:true} | {ok:false, reason}

  useEffect(() => {
    setDraft({ statut: e.statut, action: e.action, dateDebrief: e.dateDebrief, manager: getEffectiveManager(e, roster) });
    setSaveResult(null);
  }, [e.id]);

  const dirty = draft.statut !== e.statut || draft.action !== e.action || draft.dateDebrief !== e.dateDebrief || draft.manager !== effectiveMgr;

  async function handleSave(){
    setSaving(true);
    const result = await onSave(draft);
    setSaving(false);
    setSaveResult(result || { ok: false, reason: "unknown" });
    setTimeout(() => setSaveResult(null), 4000);
  }

  return (
    <div className="detail-panel">
      <div className="detail-grid">
        <div>
          <p className="field-label">Référence</p>
          <p className="field-value" style={{wordBreak:"break-all", color:"var(--textMuted)"}}>{e.reference || "—"}</p>
          <p className="field-label">Constat détaillé</p>
          <p className="field-value">{e.constat}</p>
          {e.alerte && <div className="status-msg err" style={{display:"inline-block"}}>⚠ {e.alerte}</div>}
        </div>
        <div>
          <p className="field-label">Statut du débriefing</p>
          <select style={{width:"100%", marginBottom:10}} value={draft.statut} onChange={(ev) => setDraft({...draft, statut: ev.target.value})}>
            {STATUTS.map((s) => <option key={s}>{s}</option>)}
          </select>
          <p className="field-label">Action réalisée auprès du conseiller</p>
          <textarea style={{width:"100%", marginBottom:10}} rows="2" value={draft.action} onChange={(ev) => setDraft({...draft, action: ev.target.value})}></textarea>
          <p className="field-label">Date du débriefing</p>
          <input type="date" style={{width:"100%", marginBottom:10}} value={draft.dateDebrief} onChange={(ev) => setDraft({...draft, dateDebrief: ev.target.value})} />
          <p className="field-label">Manager référent</p>
          <select style={{width:"100%", marginBottom:12}} value={draft.manager} onChange={(ev) => setDraft({...draft, manager: ev.target.value})}>
            {MANAGERS.map((m) => <option key={m}>{m}</option>)}
          </select>
          <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
            <button className="btn primary" disabled={!dirty || saving} onClick={handleSave}>
              {saving ? "Enregistrement..." : "💾 Enregistrer"}
            </button>
            <button className="btn" style={{color:"var(--red)", background:"var(--redSoft)", borderColor:"var(--redSoft)"}} onClick={onDelete}>🗑 Supprimer cette ligne</button>
          </div>
          {saveResult && saveResult.ok && <div className="status-msg ok" style={{marginTop:10, display:"inline-block"}}>✓ Modifications enregistrées en ligne</div>}
          {saveResult && !saveResult.ok && (
            <div className="status-msg err" style={{marginTop:10, display:"inline-block"}}>
              ⚠ Modification appliquée mais non sauvegardée en ligne ({saveResult.reason === "unconfigured" ? "Firebase non configuré" : "connexion indisponible"}) — elle sera perdue à la fermeture de la page.
            </div>
          )}
          {dirty && !saveResult && !saving && <div style={{fontSize:11, color:"var(--amber)", marginTop:10}}>Modifications non enregistrées — clique sur « Enregistrer » pour les valider.</div>}
        </div>
      </div>
    </div>
  );
}

function DebriefingView({ ecarts, setEcarts, weekly, onSaveNow, roster, allEvaluations }) {
  const [search, setSearch] = useState("");
  const [fInd, setFInd] = useState("Tous");
  const [fMgr, setFMgr] = useState([]);
  const [fStat, setFStat] = useState("Tous");
  const [granularity, setGranularity] = useState("tous");
  const [periodValue, setPeriodValue] = useState([]);
  const [expanded, setExpanded] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const weekOptions = useMemo(() => {
    const set = new Set(ecarts.map((e) => extractWeekCode(e.semaine)).filter(Boolean));
    return [...set].sort();
  }, [ecarts]);
  const monthOptions = useMemo(() => {
    const set = new Set(ecarts.map((e) => weekToMonth(e.semaine)).filter(Boolean));
    return MONTH_ORDER.filter((m) => set.has(m));
  }, [ecarts]);
  const dayOptions = useMemo(() => {
    const set = new Set(ecarts.map((e) => e.date).filter(Boolean));
    return [...set].sort();
  }, [ecarts]);
  const managerOptionsDebrief = useMemo(() => {
    const set = new Set(ecarts.map((e) => getEffectiveManager(e, roster)));
    return MANAGERS.filter((m) => set.has(m));
  }, [ecarts, roster]);

  const filtered = useMemo(() => ecarts.filter((e) => {
    if (fInd !== "Tous" && e.indicateur !== fInd) return false;
    if (fMgr.length > 0 && !fMgr.includes(getEffectiveManager(e, roster))) return false;
    if (fStat !== "Tous" && e.statut !== fStat) return false;
    if (granularity !== "tous" && periodValue.length > 0) {
      if (granularity === "semaine" && !periodValue.includes(extractWeekCode(e.semaine))) return false;
      if (granularity === "mois" && !periodValue.includes(weekToMonth(e.semaine))) return false;
      if (granularity === "jour" && !periodValue.includes(e.date)) return false;
    }
    if (search) {
      const hay = (e.conseiller+" "+e.reference+" "+e.constat+" "+e.ecart).toLowerCase();
      if (!hay.includes(search.toLowerCase())) return false;
    }
    return true;
  }), [ecarts, search, fInd, fMgr, fStat, granularity, periodValue, roster]);

  async function saveRow(id, patch){
    const updated = ecarts.map((x) => x.id === id ? {...x, ...patch} : x);
    setEcarts(updated);
    if (onSaveNow) return await onSaveNow(updated, weekly);
    return { ok: false, reason: "unconfigured" };
  }
  async function deleteRow(id){
    const updated = ecarts.filter((e) => e.id !== id);
    setEcarts(updated);
    if (onSaveNow) await onSaveNow(updated, weekly);
  }
  function addRow(row){ setEcarts((prev) => [...prev, {...row, id: uid()}]); setShowAdd(false); }

  return (
    <div>
      <SectionTitle icon="📋">Suivi des débriefings managers</SectionTitle>

      <div className="notice" style={{marginBottom:16, fontSize:12}}>
        ℹ️ Les écarts détectés automatiquement depuis les évaluations brutes (14 derniers jours, sous objectif ou KO)
        sont désormais ajoutés ici automatiquement, sans action manuelle — repérables par le constat
        "Détecté automatiquement depuis les évaluations brutes."
      </div>

      <PeriodFilter
        granularity={granularity} setGranularity={setGranularity}
        value={periodValue} setValue={setPeriodValue}
        weekOptions={weekOptions} monthOptions={monthOptions} dayOptions={dayOptions}
      />

      <div className="filters" style={{marginBottom:14}}>
        <div className="search-box">
          🔍
          <input placeholder="Rechercher (conseiller, référence, constat...)" value={search} onChange={(e) => setSearch(e.target.value)} />
        </div>
        <select value={fInd} onChange={(e) => setFInd(e.target.value)}>
          <option>Tous</option>{INDICATEURS.map((i) => <option key={i}>{i}</option>)}
        </select>
        <MultiSelectDropdown options={managerOptionsDebrief} selected={fMgr} setSelected={setFMgr} />
        <select value={fStat} onChange={(e) => setFStat(e.target.value)}>
          <option>Tous</option>{STATUTS.map((s) => <option key={s}>{s}</option>)}
        </select>
        <button className="btn primary" onClick={() => setShowAdd(true)}>+ Ajouter un écart</button>
      </div>

      <div style={{fontSize:12, color:"var(--textMuted)", marginBottom:8}}>{filtered.length} ligne(s) affichée(s) sur {ecarts.length}</div>

      <div className="card" style={{padding:0, overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table>
            <thead>

function NPSView({ nccResponses, roster }) {
  const [granularity, setGranularity] = useState("tous");
  const [periodValue, setPeriodValue] = useState([]);
  const [dateRange, setDateRange] = useState({ start:"", end:"" });
  const [fManager, setFManager] = useState([]);
  const [fAgent, setFAgent] = useState("Tous");
  const [fEquipe, setFEquipe] = useState("Tous");
  const [onlyToAnalyze, setOnlyToAnalyze] = useState(false);
  const [expanded, setExpanded] = useState(null);

  const responses = nccResponses || [];

  const withManager = useMemo(() => responses.map((r) => ({
    ...r,
    manager: getConseillerManagerFromRoster(r.conseillerFull, roster) || "Non trouvé",
    equipe: getConseillerStatus(r.conseillerFull, roster),
  })), [responses, roster]);

  const weekOptions = useMemo(() => {
    const set = new Set();
    withManager.forEach((r) => {
      if (r.date) {
        const d = new Date(r.date);
        if (!isNaN(d)) set.add("S" + getISOWeekLabel(d));
      }
    });
    return [...set].filter(Boolean).sort();
  }, [withManager]);
  const monthOptions = useMemo(() => {
    const set = new Set();
    withManager.forEach((r) => { if (r.date) set.add(getMonthLabel(r.date)); });
    return [...set].filter(Boolean);
  }, [withManager]);
  const dayOptions = useMemo(() => {
    const set = new Set(withManager.map((r) => r.date).filter(Boolean));
    return [...set].sort();
  }, [withManager]);
  const managerOptions = useMemo(() => {
    const set = new Set(withManager.map((r) => r.manager).filter(Boolean));
    return [...set].sort();
  }, [withManager]);
  const agentOptions = useMemo(() => {
    const set = new Set(withManager.filter((r) => fManager.length === 0 || fManager.includes(r.manager)).map((r) => r.conseiller));
    return [...set].sort();
  }, [withManager, fManager]);
  const equipeOptions = ["Nouveau", "Ancien", "Départ", "Non renseigné"];

  const filtered = useMemo(() => withManager.filter((r) => {
    if (fManager.length > 0 && !fManager.includes(r.manager)) return false;
    if (fAgent !== "Tous" && r.conseiller !== fAgent) return false;
    if (fEquipe !== "Tous" && r.equipe !== fEquipe) return false;
    if (granularity === "plage") {
      if (!dateInRange(r.date, dateRange)) return false;
    } else if (granularity !== "tous" && periodValue.length > 0 && r.date) {
      if (granularity === "jour" && !periodValue.includes(r.date)) return false;
      if (granularity === "semaine" && !periodValue.includes("S"+getISOWeekLabel(new Date(r.date)))) return false;
      if (granularity === "mois" && !periodValue.includes(getMonthLabel(r.date))) return false;
    } else if (granularity !== "tous" && granularity !== "plage" && periodValue.length > 0 && !r.date) {
      return false;
    }
    if (onlyToAnalyze) {
      const ncc = r.scoreNCC !== null && r.scoreNCC <= 7;
      const nps = r.scoreNPS !== null && r.scoreNPS <= 7;
      if (!ncc && !nps) return false;
    }
    return true;
  }), [withManager, fManager, fAgent, fEquipe, granularity, periodValue, dateRange, onlyToAnalyze]);

  const avgNCC = useMemo(() => {
    const withScore = filtered.filter((r) => r.scoreNCC !== null);
    return withScore.length ? Math.round((withScore.reduce((a,b) => a+b.scoreNCC, 0)/withScore.length)*10)/10 : null;
  }, [filtered]);
  const nps = useMemo(() => computeAggregateNPS(filtered), [filtered]);
  const toAnalyzeCount = useMemo(() => withManager.filter((r) => (r.scoreNCC !== null && r.scoreNCC <= 7) || (r.scoreNPS !== null && r.scoreNPS <= 7)).length, [withManager]);

  return (
    <div>
      <SectionTitle icon="⭐">Analyse NPS</SectionTitle>

      {responses.length === 0 ? (
        <div className="notice warn" style={{marginBottom:16}}>
          <span className="ic">⚠</span>
          <div>Aucune réponse NCC chargée — importe le fichier d'enquête satisfaction dans l'onglet Importer (section « Importer les réponses NCC ») pour alimenter cette vue.</div>
        </div>
      ) : (
        <div className="notice info" style={{marginBottom:16}}>
          <span className="ic">ℹ</span>
          <div>Le NPS agrégé = % promoteurs (note 9-10) − % détracteurs (note 0-6) sur la question 4. Le canal
          (téléphone/mail) n'est pas fourni par le fichier d'enquête source — non affiché pour l'instant.</div>
        </div>
      )}

      <PeriodFilter
        granularity={granularity} setGranularity={setGranularity}
        value={periodValue} setValue={setPeriodValue}
        weekOptions={weekOptions} monthOptions={monthOptions} dayOptions={dayOptions}
        allowRange={true} dateRange={dateRange} setDateRange={setDateRange}
      />

      <div className="filters" style={{marginBottom:14, marginTop:-8}}>
        <MultiSelectDropdown label="Manager :" options={managerOptions} selected={fManager} setSelected={(v) => { setFManager(v); setFAgent("Tous"); }} />
        <span style={{fontSize:12, color:"var(--textMuted)", fontWeight:600, marginLeft:8}}>Agent :</span>
        <select value={fAgent} onChange={(e) => setFAgent(e.target.value)}>
          <option>Tous</option>{agentOptions.map((a) => <option key={a}>{a}</option>)}
        </select>
        <span style={{fontSize:12, color:"var(--textMuted)", fontWeight:600, marginLeft:8}}>Équipe (Mada) :</span>
        <select value={fEquipe} onChange={(e) => setFEquipe(e.target.value)}>
          <option>Tous</option>{equipeOptions.map((s) => <option key={s}>{s}</option>)}
        </select>
        <label style={{display:"flex", alignItems:"center", gap:6, fontSize:13, marginLeft:8, cursor:"pointer"}}>
          <input type="checkbox" checked={onlyToAnalyze} onChange={(e) => setOnlyToAnalyze(e.target.checked)} />
          À analyser (NCC ou NPS ≤ 7)
        </label>
      </div>

      <div className="stat-row" style={{marginBottom:16}}>
        <StatCard label="Réponses (filtre actif)" value={filtered.length} tone="neutral" />
        <StatCard label="Note NCC moyenne" value={avgNCC !== null ? avgNCC+"/10" : "—"} tone={avgNCC!==null && avgNCC<8.1 ? "bad":"good"} />
        <StatCard label="Score NPS agrégé" value={nps !== null ? nps : "—"} tone={nps!==null && nps<0 ? "bad":"good"} sub="% promoteurs − % détracteurs" />
        <StatCard label="À analyser (total)" value={toAnalyzeCount} tone={toAnalyzeCount>0 ? "bad":"good"} />
      </div>

      <div className="card" style={{padding:0, overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table>
            <thead>
              <tr>{["Manager","Agent","Équipe","Date","N° demande","Canal","Score NCC","Score NPS"].map((h) => <th key={h}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {filtered.slice(0,300).map((r) => {
                const toAnalyze = (r.scoreNCC !== null && r.scoreNCC <= 7) || (r.scoreNPS !== null && r.scoreNPS <= 7);
                return (
                  <Fragment key={r.ndemande}>
                    <tr className={toAnalyze ? "alert-row" : ""}>
                      <td>{r.manager}</td>
                      <td>{r.conseiller}</td>
                      <td style={{fontSize:12, color:"var(--textMuted)"}}>{r.equipe}</td>
                      <td style={{whiteSpace:"nowrap"}}>{r.date || "—"}</td>
                      <td>
                        <button className="btn" style={{padding:"2px 8px", fontSize:12}} onClick={() => setExpanded(expanded===r.ndemande ? null : r.ndemande)}>
                          {r.ndemande} {expanded===r.ndemande ? "▴" : "▾"}
                        </button>
                      </td>
                      <td style={{fontSize:12, color:"var(--textMuted)"}}>Non déterminé</td>
                      <td style={{fontWeight:600, color: r.scoreNCC!==null && r.scoreNCC<=7 ? "var(--red)" : "var(--green)"}}>{r.scoreNCC !== null ? r.scoreNCC+"/10" : "—"}</td>
                      <td style={{fontWeight:600, color: r.scoreNPS!==null && r.scoreNPS<=7 ? "var(--red)" : "var(--green)"}}>{r.scoreNPS !== null ? r.scoreNPS : "—"}</td>
                    </tr>
                    {expanded === r.ndemande && (
                      <tr>
                        <td colSpan="8" style={{background:"var(--purpleSoft)", padding:"12px 16px"}}>
                          <div style={{fontSize:12, fontWeight:600, color:"var(--purpleDark)", marginBottom:4}}>Motif principal</div>
                          <div style={{fontSize:13, marginBottom:8}}>{r.motif || "—"}</div>
                          <div style={{fontSize:12, fontWeight:600, color:"var(--purpleDark)", marginBottom:4}}>Verbatim client</div>
                          <div style={{fontSize:13}}>{r.verbatim || "Aucun commentaire renseigné."}</div>
                        </td>
                      </tr>
                    )}
                  </Fragment>
                );
              })}
              {filtered.length === 0 && (
                <tr><td colSpan="8" style={{textAlign:"center", padding:20, color:"var(--textMuted)"}}>Aucune réponse ne correspond à ces filtres.</td></tr>
              )}
            </tbody>
          </table>
        </div>
        {filtered.length > 300 && (
          <div style={{textAlign:"center", padding:8, fontSize:12, color:"var(--textMuted)"}}>Affichage limité à 300 lignes — affine les filtres pour voir le reste.</div>
        )}
      </div>
    </div>
  );
}

function ImportView({ ecarts, setEcarts, onImportJSON, roster, setRoster, nccResponses, setNccResponses, allEvaluations, setAllEvaluations }) {
  const [status, setStatus] = useState(null);
  const [jsonStatus, setJsonStatus] = useState(null);
  const [rosterStatus, setRosterStatus] = useState(null);
  const [nccStatus, setNccStatus] = useState(null);
  const [evalStatus, setEvalStatus] = useState(null);
  const [preview, setPreview] = useState([]);

  function handleAllEvaluationsFile(file){
    const isExcel = /\.xlsx?$/i.test(file.name);
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        let rows = [];
        if (isExcel) {
          const wb = XLSX.read(evt.target.result, {type:"binary"});
          rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""});
        } else {
          rows = Papa.parse(evt.target.result, {header:true, skipEmptyLines:true}).data;
        }
        const mapped = rows.map((r) => ({
          indicateur: r["Indicateur"] || r["indicateur"] || "",
          conseiller: String(r["Conseiller"] || r["conseiller"] || "").trim(),
          score: r["Score"] !== undefined && r["Score"] !== "" ? Number(r["Score"]) : (r["score"] !== undefined && r["score"] !== "" ? Number(r["score"]) : null),
          statut: r["Statut"] || r["statut"] || "",
          date: r["Date"] || r["date"] || "",
          semaine: r["Semaine"] || r["semaine"] || "",
        })).filter((r) => r.conseiller && r.indicateur);

        const key = (r) => [r.indicateur, r.conseiller, r.date, r.semaine, r.score, r.statut].join("|");
        const existingKeys = new Set((allEvaluations||[]).map(key));
        const news = mapped.filter((r) => !existingKeys.has(key(r)));
        setAllEvaluations([...(allEvaluations||[]), ...news]);
        setEvalStatus({ ok:true, msg: `${mapped.length} évaluation(s) lue(s), ${news.length} nouvelle(s) ajoutée(s) (${mapped.length-news.length} doublon(s) ignoré(s)).` });
      } catch(err){
        setEvalStatus({ ok:false, msg:"Fichier illisible — colonnes attendues : Indicateur, Conseiller, Score (Voix/Mail/NCC) ou Statut (OK/KO/SI pour Process/Transfert), Date, Semaine." });
      }
    };
    if (isExcel) reader.readAsBinaryString(file); else reader.readAsText(file);
  }
  function downloadEvalTemplate(){

      { Indicateur:"Hubicus Voix", Conseiller:"Rosa", Score:91, Statut:"", Date:"2026-07-20", Semaine:"S29" },

          rows = Papa.parse(evt.target.result, {header:true, skipEmptyLines:true}).data;
        }
        const parsed = parseNCCRows(rows);
        const existingKeys = new Set((nccResponses||[]).map((p) => p.ndemande));
        const news = parsed.filter((p) => !existingKeys.has(p.ndemande));
        setNccResponses([...(nccResponses||[]), ...news]);
        setNccStatus({ ok:true, msg: `${parsed.length} réponse(s) lue(s) dans le fichier, dont ${news.length} nouvelle(s) ajoutée(s) (${parsed.length-news.length} doublon(s) ignoré(s) par N° demande).` });
      } catch(err){
        setNccStatus({ ok:false, msg:"Fichier illisible — colonnes attendues : Conseiller, N° Demande, Question, Réponse, Date de L'enquête (format 'une ligne par question', comme les exports Reporting_Satisfaction_Client)." });
      }
    };
    if (isExcel) reader.readAsBinaryString(file); else reader.readAsText(file);
  }

  function handleRosterFile(file){
    const isExcel = /\.xlsx?$/i.test(file.name);
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        let rows = [];
        if (isExcel) {
          const wb = XLSX.read(evt.target.result, {type:"binary"});
          rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""});
        } else {
          rows = Papa.parse(evt.target.result, {header:true, skipEmptyLines:true}).data;
        }
        const mapped = rows.map((r) => {
          const conseillerRaw = r["Conseiller"] || r["conseiller"] || r["Nom complet"] || r["Diamant"] || r["Nom"] || r["log mail"] || "";
          const managerRaw = r["Manager"] || r["manager"] || "";
          const statutRaw = r["Statut"] || r["statut"] || r["Nouveau/Ancien"] || r["Nouveau / Ancien"] || r["Anciennét"] || r["Ancienneté"] || "";
          const dateEntree = r["Date d'entrée en prod"] || r["Date d'entrée"] || r["dateEntreeProd"] || "";
          return {
            conseiller: String(conseillerRaw).trim(),
            manager: String(managerRaw).trim(),
            site: String(r["Site"] || r["site"] || r["SITE"] || "").trim(),
            statut: ["Nouveau","Ancien","Départ"].includes(statutRaw) ? statutRaw : "",
            dateEntreeProd: dateEntree ? String(dateEntree) : "",
          };
        }).filter((r) => r.conseiller)
          .filter((r) => !r.site || /mada/i.test(r.site)); // ne conserver que le site Mada quand un site est renseigné
        setRoster(mapped);
        setRosterStatus({ok:true, msg: mapped.length+" conseiller(s) chargé(s) dans la répartition des équipes. Ce contenu remplace la répartition précédente."});
      } catch(err){
        setRosterStatus({ok:false, msg:"Fichier illisible — colonnes attendues : Conseiller, Manager, Site (optionnel), Statut ou Date d'entrée en prod (optionnel)."});
      }
    };
    if (isExcel) reader.readAsBinaryString(file); else reader.readAsText(file);
  }

  function downloadRosterTemplate(){
    exportCSV([
      { Conseiller:"Rosa", Manager:"Ibra", Site:"MADA", Statut:"Ancien", "Date d'entrée en prod":"" },
      { Conseiller:"Jacky", Manager:"Rojo", Site:"MADA", Statut:"Nouveau", "Date d'entrée en prod":"2026-06-01" },
    ], "modele_repartition_equipes.csv");
  }

  function handleJSONFile(file){
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!Array.isArray(data.ecarts)) throw new Error("format invalide");
        onImportJSON(data);
        setJsonStatus({ok:true, msg: "Chargé : "+data.ecarts.length+" écart(s)"+(data.historique_kpi ? " et "+data.historique_kpi.length+" semaine(s) d'historique" : "")+". Ce contenu remplace les données actuelles."});
      } catch(err){
        setJsonStatus({ok:false, msg:"JSON illisible — vérifie qu'il s'agit bien d'un export généré par ce tableau de bord."});
      }
    };
    reader.readAsText(file);
  }

  function handleFile(file){
    const isExcel = /\.xlsx?$/i.test(file.name);
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        let rows = [];
        if (isExcel) {
          const wb = XLSX.read(evt.target.result, {type:"binary"});
          rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""});
        } else {
          rows = Papa.parse(evt.target.result, {header:true, skipEmptyLines:true}).data;
        }
        setPreview(rows.slice(0,8));
        const mapped = rows.map((r) => ({
          id: uid(),
          indicateur: r["Indicateur"] || r["indicateur"] || "Hubicus Voix",
          conseiller: r["Conseiller"] || r["conseiller"] || "",
          reference: r["Référence"] || r["reference"] || r["N° de ticket"] || "",
          semaine: r["Semaine"] || r["semaine"] || "",
          date: r["Date"] || r["date"] || "",
          ecart: r["Écart constaté"] || r["ecart"] || "",
          statut: r["Débriefing (OK/KO)"] || r["statut"] || "À traiter",
          action: r["Action réalisée"] || r["action"] || "",
          dateDebrief: r["Date du débriefing"] || "",
          constat: r["Constat détaillé"] || r["constat"] || "",
          managerDispatch: r["Manager (dispatch)"] || "",
          manager: r["Manager (simplifié)"] || r["manager"] || "Non trouvé",
          alerte: r["Alerte récurrence"] || "",
        })).filter((r) => r.conseiller);
        const existingRefs = new Set(ecarts.map((e) => e.reference));
        const news = mapped.filter((m) => !existingRefs.has(m.reference));
        setEcarts((prev) => [...prev, ...news]);
        setStatus({ok:true, msg: news.length+" nouvelle(s) ligne(s) ajoutée(s) ("+(mapped.length-news.length)+" doublon(s) ignoré(s) par référence)."});
      } catch(err){
        setStatus({ok:false, msg:"Fichier illisible — vérifie les colonnes attendues (Indicateur, Conseiller, Référence, Semaine, Date, Écart constaté...)."});
      }
    };
    if (isExcel) reader.readAsBinaryString(file); else reader.readAsText(file);
  }

  function downloadTemplate(){
    exportCSV([{
      Indicateur:"Hubicus Voix", Conseiller:"", "Référence":"", Semaine:"S29", Date:"",
      "Écart constaté":"", "Débriefing (OK/KO)":"", "Action réalisée":"", "Date du débriefing":"",

    }], "modele_import_ecarts.csv");

      <div className="notice info" style={{marginBottom:16}}>
        <span className="ic">ℹ</span>
        <div>Ce tableau de bord importe une extraction <strong>déjà consolidée</strong> (CSV ou Excel avec les colonnes
        Indicateur / Conseiller / Référence / Semaine / Écart constaté...). Les fichiers sources bruts (grille téléphone
        Hubicus, contrôle process Auchan/Interne, transferts) ont des structures spécifiques par onglet — fais-les
        d'abord traiter par Claude en conversation, qui te renverra un CSV au bon format à importer ici.</div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:600, color:"var(--purpleDark)", marginBottom:8, fontSize:14}}>Recharger un export JSON</div>
        <p style={{fontSize:13, color:"var(--textMuted)", marginTop:0}}>

          l'avoir fait enrichir par Claude, ou pour le recharger dans un autre navigateur. Le contenu remplace
          entièrement les écarts et l'historique KPI actuellement affichés.
        </p>
        <label className="drop">
          ⬆ Choisir un fichier .json
          <input type="file" accept=".json,application/json" style={{display:"none"}} onChange={(e) => e.target.files[0] && handleJSONFile(e.target.files[0])} />
        </label>
        {jsonStatus && <div className={"status-msg " + (jsonStatus.ok ? "ok" : "err")}>{jsonStatus.msg}</div>}
      </div>

      <div className="divider-row"><div className="line"></div><span>ou ajouter des lignes depuis un CSV / Excel</span><div className="line"></div></div>

      <div style={{display:"flex", flexWrap:"wrap", gap:12, marginBottom:12}}>
        <label className="drop" style={{flex:1, minWidth:220}}>

          <input type="file" accept=".csv,.xlsx,.xls" style={{display:"none"}} onChange={(e) => e.target.files[0] && handleFile(e.target.files[0])} />
        </label>
        <button className="btn" onClick={downloadTemplate}>⬇ Télécharger le modèle CSV</button>
      </div>

      {status && <div className={"status-msg " + (status.ok ? "ok" : "err")}>{status.msg}</div>}

      <div className="divider-row"><div className="line"></div><span>répartition des équipes</span><div className="line"></div></div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:600, color:"var(--purpleDark)", marginBottom:8, fontSize:14}}>Importer la répartition des équipes</div>
        <p style={{fontSize:13, color:"var(--textMuted)", marginTop:0}}>

          et soit <code>Statut</code> (Nouveau/Ancien), soit <code>Date d'entrée en prod</code> (un conseiller entré il y a moins de
          {" "}{NOUVEAU_ANCIEN_SEUIL_JOURS} jours est classé « Nouveau » automatiquement). Ceci alimente le filtre
          Nouveau/Ancien et le rapprochement manager dans l'onglet Reporting.
        </p>
        <div style={{display:"flex", flexWrap:"wrap", gap:12}}>
          <label className="drop" style={{flex:1, minWidth:220}}>
            ⬆ Choisir un fichier équipes (.csv, .xlsx)
            <input type="file" accept=".csv,.xlsx,.xls" style={{display:"none"}} onChange={(e) => e.target.files[0] && handleRosterFile(e.target.files[0])} />
          </label>
          <button className="btn" onClick={downloadRosterTemplate}>⬇ Télécharger le modèle CSV</button>
        </div>
        {rosterStatus && <div className={"status-msg " + (rosterStatus.ok ? "ok" : "err")}>{rosterStatus.msg}</div>}
        {roster && roster.length > 0 && (
          <p style={{fontSize:12, color:"var(--textMuted)", marginTop:10}}>
            Répartition actuelle : {roster.length} conseiller(s) — {roster.filter((r) => r.statut === "Nouveau" || (r.dateEntreeProd && (Date.now() - new Date(r.dateEntreeProd).getTime())/86400000 <= NOUVEAU_ANCIEN_SEUIL_JOURS)).length} « Nouveau » détecté(s).
          </p>
        )}
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:600, color:"var(--purpleDark)", marginBottom:8, fontSize:14}}>Importer les réponses NCC (pour l'onglet Analyse NPS)</div>
        <p style={{fontSize:13, color:"var(--textMuted)", marginTop:0}}>
          Fichier brut d'enquête satisfaction (une ligne par question — même format que « Reporting_Satisfaction_Client »),
          colonnes attendues : <code>Conseiller</code>, <code>N° Demande</code>, <code>Question</code>, <code>Réponse</code>,
          <code>Date de L'enquête</code>. Alimente le score NCC (question 1), le score NPS (question 4) et le verbatim
          (question 5) de l'onglet Analyse NPS. Les doublons sont ignorés automatiquement par N° de demande.
        </p>
        <label className="drop">
          ⬆ Choisir un fichier réponses NCC (.csv, .xlsx)
          <input type="file" accept=".csv,.xlsx,.xls" style={{display:"none"}} onChange={(e) => e.target.files[0] && handleNCCImportFile(e.target.files[0])} />
        </label>
        {nccStatus && <div className={"status-msg " + (nccStatus.ok ? "ok" : "err")}>{nccStatus.msg}</div>}
        {nccResponses && nccResponses.length > 0 && (
          <p style={{fontSize:12, color:"var(--textMuted)", marginTop:10}}>{nccResponses.length} réponse(s) NCC actuellement chargée(s) pour l'analyse NPS.</p>
        )}
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:600, color:"var(--purpleDark)", marginBottom:8, fontSize:14}}>Importer toutes les évaluations (score exact par conseiller)</div>
        <p style={{fontSize:13, color:"var(--textMuted)", marginTop:0}}>
          Contrairement aux écarts (qui ne gardent que les évaluations sous l'objectif), ce fichier doit contenir
          <strong> toutes</strong> les évaluations réalisées (conformes et non conformes), pour calculer une vraie
          moyenne par conseiller dans l'onglet Suivi performance. Colonnes : <code>Indicateur</code>, <code>Conseiller</code>,
          <code>Score</code> (0-100 pour Voix/Mail, 0-10 pour NCC) <em>ou</em> <code>Statut</code> (OK/KO/SI pour
          Process Auchan/Interne/Transfert), <code>Date</code>, <code>Semaine</code>.
        </p>
        <div style={{display:"flex", flexWrap:"wrap", gap:12}}>
          <label className="drop" style={{flex:1, minWidth:220}}>
            ⬆ Choisir un fichier toutes évaluations (.csv, .xlsx)
            <input type="file" accept=".csv,.xlsx,.xls" style={{display:"none"}} onChange={(e) => e.target.files[0] && handleAllEvaluationsFile(e.target.files[0])} />
          </label>
          <button className="btn" onClick={downloadEvalTemplate}>⬇ Télécharger le modèle CSV</button>
        </div>
        {evalStatus && <div className={"status-msg " + (evalStatus.ok ? "ok" : "err")}>{evalStatus.msg}</div>}
        {allEvaluations && allEvaluations.length > 0 && (
          <p style={{fontSize:12, color:"var(--textMuted)", marginTop:10}}>{allEvaluations.length} évaluation(s) complète(s) actuellement chargée(s).</p>
        )}
      </div>


      {preview.length > 0 && (
        <div className="card" style={{overflowX:"auto", marginTop:14}}>
          <div style={{fontSize:12, fontWeight:600, color:"var(--purpleDark)", marginBottom:8}}>Aperçu (8 premières lignes lues)</div>
          <table style={{fontSize:12}}>
            <thead><tr>{Object.keys(preview[0]).slice(0,6).map((k) => <th key={k} style={{color:"var(--textMuted)", background:"none"}}>{k}</th>)}</tr></thead>
            <tbody>
              {preview.map((r,i) => (
                <tr key={i}>{Object.keys(preview[0]).slice(0,6).map((k) => <td key={k} style={{maxWidth:160, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{String(r[k])}</td>)}</tr>
              ))}

      )}
    </div>
  );
}

        <button className="btn outline" onClick={() => exportExcel(ecarts, weekly, roster)}>📊 Générer le fichier Excel complet</button>
        <button className="btn" onClick={() => exportForClaude(ecarts, weekly, roster, nccResponses, allEvaluations)}>⧉ Export pour régénérer le PowerPoint</button>
      </div>

      <div className="notice warn">
        <span className="ic">⚠</span>

        disponible côté navigateur). Le bouton « Export pour régénérer le PowerPoint » télécharge un fichier JSON
        structuré — dépose-le dans une conversation Claude pour obtenir automatiquement les slides mises à jour.</div>
      </div>
    </div>
  );
}
