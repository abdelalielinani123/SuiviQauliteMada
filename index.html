<style>
  :root{
    --purple:#96408F; --purpleDark:#5C2258; --purpleSoft:#F3E9F2;

  *{box-sizing:border-box;}
  body{margin:0; font-family:Calibri,Arial,sans-serif; background:#FAFAFB; color:var(--text);}
  .wrap{max-width:1100px; margin:0 auto; padding:0 24px;}
  .header{background:var(--purpleDark); padding:20px 0;}
  .header-inner{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;}
  .header h1{color:#fff; font-size:19px; margin:0; font-weight:700;}
  .header p{color:#E8D5E6; font-size:12px; margin:2px 0 0;}
  .header .status{color:#E8D5E6; font-size:12px; display:flex; align-items:center; gap:6px;}
  .tabs{background:#fff; border-bottom:1px solid var(--greyLine);}
  .tabs-inner{display:flex; gap:4px;}
  .tab-btn{background:none; border:none; padding:12px 15px; font-size:14px; font-weight:500; cursor:pointer;
    color:var(--textMuted); border-bottom:2px solid transparent; display:flex; align-items:center; gap:6px;}
  .tab-btn.active{color:var(--purpleDark); border-bottom-color:var(--purple);}
  .content{padding:24px 0 40px;}
  .section-title{display:flex; align-items:center; gap:8px; margin:0 0 16px;}
  .section-title .ic{background:var(--purpleSoft); color:var(--purpleDark); width:28px; height:28px; border-radius:8px;
    display:flex; align-items:center; justify-content:center; font-size:14px;}
  .section-title h2{font-size:15px; font-weight:600; color:var(--purpleDark); margin:0;}
  .card{background:#fff; border:1px solid var(--greyLine); border-radius:12px; padding:16px;}
  .stat-row{display:flex; flex-wrap:wrap; gap:12px;}
  .stat{flex:1; min-width:160px; border-radius:12px; padding:14px 16px;}
  .stat .v{font-size:24px; font-weight:700;}
  .stat .l{font-size:11px; color:var(--textMuted); margin-top:4px;}
  .stat .s{font-size:11px; margin-top:2px;}
  .stat.neutral{background:#fff; border:1px solid var(--greyLine);}
  .stat.good{background:var(--greenSoft);} .stat.good .v,.stat.good .s{color:var(--green);}
  .stat.bad{background:var(--redSoft);} .stat.bad .v,.stat.bad .s{color:var(--red);}
  .stat.accent{background:var(--purpleSoft);} .stat.accent .v,.stat.accent .s{color:var(--purpleDark);}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead tr{background:var(--purple);}
  thead th{color:#fff; text-align:left; padding:8px 10px; font-size:12px; font-weight:500; white-space:nowrap;}
  tbody td{padding:8px 10px; border-top:1px solid var(--greyLine);}
  tbody tr:nth-child(even){background:var(--grey);}
  tbody tr.alert-row{background:var(--amberSoft) !important;}
  tbody tr.clickable{cursor:pointer;}
  .badge{display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:999px; font-size:12px; font-weight:500;}
  .badge.OK{background:var(--greenSoft); color:var(--green);}
  .badge.KO{background:var(--redSoft); color:var(--red);}
  .badge.atraiter{background:var(--amberSoft); color:var(--amber);}
  .btn{display:inline-flex; align-items:center; gap:7px; padding:10px 16px; border-radius:10px; font-size:14px;
    font-weight:500; border:1px solid var(--greyLine); background:#fff; cursor:pointer; color:var(--text);}
  .btn.primary{background:var(--purple); color:#fff; border-color:var(--purple);}
  .btn.outline{border-color:var(--purple); color:var(--purpleDark); background:#fff;}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  input[type=text],input[type=date],select,textarea{
    font-size:13px; border:1px solid var(--greyLine); border-radius:8px; padding:7px 9px; font-family:inherit;}
  .filters{display:flex; flex-wrap:wrap; gap:8px; align-items:center; background:#fff; border:1px solid var(--greyLine);
    border-radius:12px; padding:12px;}
  .search-box{display:flex; align-items:center; gap:6px; background:var(--grey); border-radius:8px; padding:7px 10px; flex:1; min-width:220px;}
  .search-box input{border:none; background:none; outline:none; font-size:13px; width:100%;}
  .drop{border:2px dashed var(--purple); border-radius:12px; padding:16px; display:flex; align-items:center;
    justify-content:center; gap:8px; font-size:14px; font-weight:500; color:var(--purpleDark); cursor:pointer;}
  .notice{border-radius:12px; padding:14px 16px; display:flex; gap:10px; align-items:flex-start; font-size:13px;}
  .notice.info{background:var(--purpleSoft); color:var(--text);}
  .notice.warn{background:var(--amberSoft); color:var(--text);}
  .notice .ic{flex-shrink:0; margin-top:1px;}
  .status-msg{font-size:13px; padding:8px 12px; border-radius:8px; margin-top:10px;}
  .status-msg.ok{background:var(--greenSoft); color:var(--green);}
  .status-msg.err{background:var(--redSoft); color:var(--red);}
  .detail-panel{background:var(--purpleSoft); padding:16px 18px;}
  .detail-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  @media (max-width:760px){.detail-grid{grid-template-columns:1fr;}}
  .field-label{font-size:12px; font-weight:600; color:var(--purpleDark); margin:0 0 4px;}
  .field-value{font-size:13px; margin-bottom:10px;}
  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center;
    justify-content:center; padding:16px; z-index:50;}
  .modal{background:#fff; border-radius:12px; padding:20px; width:100%; max-width:480px; max-height:85vh; overflow-y:auto;}
  .modal h3{margin:0 0 14px; color:var(--purpleDark); font-size:15px;}
  .modal-close-row{display:flex; justify-content:space-between; align-items:center;}
  .field-stack > *{width:100%; margin-bottom:10px; display:block;}
  .divider-row{display:flex; align-items:center; gap:10px; margin:18px 0;}
  .divider-row .line{flex:1; height:1px; background:var(--greyLine);}
  .divider-row span{font-size:12px; color:var(--textMuted);}
  .footer{text-align:center; font-size:11px; color:var(--textMuted); padding:16px 0;}
  code{background:var(--grey); padding:1px 5px; border-radius:4px; font-size:12px;}
  .truncate{white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:280px; display:inline-block; vertical-align:bottom;}
</style>

/* Correspondance semaine -> mois, déduite des dates réelles (S19 = semaine du 04/05/2026) */
const WEEK_TO_MONTH = {
  S19: "Mai", S20: "Mai", S21: "Mai", S22: "Mai",
  S23: "Juin", S24: "Juin", S25: "Juin", S26: "Juin",
  S27: "Juillet", S28: "Juillet",
};
const MONTH_ORDER = ["Mai", "Juin", "Juillet"];

function extractWeekCode(semaineStr){
  if (!semaineStr) return null;
  const m = String(semaineStr).match(/S\d+/);
  return m ? m[0] : null;
}
function weekToMonth(semaineStr){
  const code = extractWeekCode(semaineStr);
  return code ? (WEEK_TO_MONTH[code] || null) : null;
}
function computeMonthly(weekly){
  return MONTH_ORDER.map((mois) => {
    const rows = weekly.filter((w) => WEEK_TO_MONTH[w.semaine] === mois);
    const row = { mois };
    INDICATEURS.forEach((ind) => {
      const vals = rows.map((r) => r[ind]).filter((v) => v !== null && v !== undefined);
      row[ind] = vals.length ? Math.round((vals.reduce((a,b) => a+b, 0)/vals.length) * 10)/10 : null;
    });
    return row;
  }).filter((row) => INDICATEURS.some((ind) => row[ind] !== null));
}
function computeDaily(ecarts){
  const map = {};
  ecarts.forEach((e) => {
    if (!e.date) return;
    map[e.date] = (map[e.date] || 0) + 1;
  });
  return Object.keys(map).sort().map((date) => ({ date, count: map[date] }));
}

function normalizeName(str){
  if (!str) return "";
  return String(str).trim().split(/\s+/)[0].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function findRosterEntry(conseiller, roster){
  const key = normalizeName(conseiller);
  if (!key || !roster || !roster.length) return null;
  return roster.find((r) => normalizeName(r.conseiller) === key) || null;
}

function getConseillerStatus(conseiller, roster){
  const entry = findRosterEntry(conseiller, roster);
  if (!entry) return "Non renseigné";
  if (entry.statut === "Nouveau" || entry.statut === "Ancien") return entry.statut;
  if (entry.dateEntreeProd) {
    const d = new Date(entry.dateEntreeProd);
    if (!isNaN(d)) {
      const days = (Date.now() - d.getTime()) / 86400000;
      return days <= NOUVEAU_ANCIEN_SEUIL_JOURS ? "Nouveau" : "Ancien";
    }
  }
  return "Non renseigné";
}

function getConseillerManagerFromRoster(conseiller, roster){
  const entry = findRosterEntry(conseiller, roster);
  return entry ? entry.manager : null;
}

function uid(){ return Date.now() + Math.floor(Math.random()*100000); }

async function waitForFirebase(){
  let tries = 0;
  while (!window.__firebaseReady && tries < 200) {
    await new Promise((r) => setTimeout(r, 25));
    tries++;
  }
}

async function fsLoad(key, fallback){
  await waitForFirebase();
  if (!window.__firebaseConfigured) return { value: fallback, status: "unconfigured" };
  if (window.__firebaseError || !window.__fb) return { value: fallback, status: "error", error: window.__firebaseError };
  try {
    const ref = window.__fb.doc(window.__fb.db, "dashboard", key);
    const snap = await window.__fb.getDoc(ref);
    if (snap.exists() && snap.data().payload) return { value: snap.data().payload, status: "ok" };
    return { value: fallback, status: "ok" };
  } catch (e) {
    return { value: fallback, status: "error", error: e.message };
  }
}

async function fsSave(key, value){
  if (!window.__firebaseConfigured || window.__firebaseError || !window.__fb) return false;
  try {
    const ref = window.__fb.doc(window.__fb.db, "dashboard", key);
    await window.__fb.setDoc(ref, { payload: value, updatedAt: new Date().toISOString() });
    return true;
  } catch (e) {
    return false;
  }
}

function fsSubscribe(key, onChange){
  if (!window.__firebaseConfigured || window.__firebaseError || !window.__fb) return () => {};
  try {
    const ref = window.__fb.doc(window.__fb.db, "dashboard", key);
    return window.__fb.onSnapshot(ref, (snap) => {
      if (snap.exists() && snap.data().payload) onChange(snap.data().payload);
    });
  } catch (e) {
    return () => {};
  }
}

function computeIndicatorStats(ecarts){
  return INDICATEURS.map((ind) => {
    const rows = ecarts.filter((e) => e.indicateur === ind);
    const done = rows.filter((r) => r.statut === "OK" || r.statut === "KO").length;
    return { indicateur: ind, total: rows.length, done, taux: rows.length ? Math.round((done/rows.length)*1000)/10 : 0 };
  });
}
function computeManagerStats(ecarts){
  return MANAGERS.map((m) => {
    const rows = ecarts.filter((e) => e.manager === m);
    const done = rows.filter((r) => r.statut === "OK" || r.statut === "KO").length;
    return { manager: m, total: rows.length, done, taux: rows.length ? Math.round((done/rows.length)*1000)/10 : 0 };
  }).filter((m) => m.total > 0);
}
function downloadBlob(content, filename, type){
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function exportCSV(rows, filename){
  const csv = Papa.unparse(rows);
  downloadBlob(csv, filename, "text/csv;charset=utf-8;");
}

  const reportRows = [

  const bw = (W - padL - padR) / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height}}>
      <line x1={padL} y1={H-padB} x2={W-padR} y2={H-padB} stroke="var(--greyLine)" />
      {[0,25,50,75,100].map((g) => (
        <line key={g} x1={padL} x2={W-padR} y1={H-padB-(g/100)*innerH} y2={H-padB-(g/100)*innerH} stroke="#EFEDEF" />
      ))}
      {data.map((d, i) => {
        const val = d[valueKey] || 0;
        const barH = (val/100) * innerH;
        const x = padL + i*bw + bw*0.15;
        const w = bw*0.7;
        const y = H - padB - barH;
        return (
          <g key={i}>
            <rect x={x} y={y} width={w} height={barH} rx="4" fill={barColor(val)} />
            <text x={x+w/2} y={y-6} fontSize="11" fontWeight="700" textAnchor="middle" fill="#241C29">{val}%</text>
            <text x={x+w/2} y={H-padB+16} fontSize="10" textAnchor="middle" fill="#6B6270">
              {String(d[labelKey]).length > 14 ? String(d[labelKey]).slice(0,13)+"…" : d[labelKey]}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function BarChartH({ data, labelKey, valueKey, height=220 }) {
  const W = 640, H = height, padL = 96, padR = 46, rowH = (H-16) / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height}}>
      {data.map((d, i) => {
        const val = d[valueKey] || 0;
        const maxW = W - padL - padR;
        const w = (val/100) * maxW;
        const y = 8 + i*rowH;
        return (
          <g key={i}>
            <text x={padL-8} y={y+rowH/2+4} fontSize="11" textAnchor="end" fill="#241C29">{d[labelKey]}</text>
            <rect x={padL} y={y+rowH*0.2} width={maxW} height={rowH*0.6} fill="#F4F6F7" rx="4" />
            <rect x={padL} y={y+rowH*0.2} width={w} height={rowH*0.6} fill={barColor(val)} rx="4" />
            <text x={padL+w+8} y={y+rowH/2+4} fontSize="11" fontWeight="700" fill="#241C29">{val}%</text>
          </g>
        );
      })}
    </svg>
  );
}

function LineChartMulti({ data, series, height=340, xKey="semaine" }) {
  const W = 700, H = height, padL = 30, padR = 20, padT = 20, padB = 50;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const stepX = innerW / (data.length - 1 || 1);
  const yFor = (v) => padT + innerH - (Math.max(0, Math.min(100, v))/100) * innerH;
  const xFor = (i) => padL + i*stepX;

  function pathFor(key){
    let d = "";
    let started = false;
    data.forEach((row, i) => {
      const v = row[key];
      if (v === null || v === undefined) { started = false; return; }
      const cmd = started ? "L" : "M";
      d += `${cmd}${xFor(i)},${yFor(v)} `;
      started = true;
    });
    return d.trim();
  }

  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height}}>
        {[0,25,50,75,100].map((g) => (
          <g key={g}>
            <line x1={padL} x2={W-padR} y1={yFor(g)} y2={yFor(g)} stroke="#EFEDEF" />
            <text x={2} y={yFor(g)+3} fontSize="9" fill="#6B6270">{g}</text>
          </g>
        ))}
        <line x1={padL} x2={W-padR} y1={yFor(85)} y2={yFor(85)} stroke="#96408F" strokeDasharray="4 3" />
        <text x={W-padR-2} y={yFor(85)-4} fontSize="9" fill="#96408F" textAnchor="end">Obj. Hubicus 85%</text>
        <line x1={padL} x2={W-padR} y1={yFor(90)} y2={yFor(90)} stroke="#5C2258" strokeDasharray="2 2" />
        <text x={W-padR-2} y={yFor(90)-4} fontSize="9" fill="#5C2258" textAnchor="end">Obj. Process/Transfert 90%</text>

        {series.map((s) => (
          <path key={s.key} d={pathFor(s.key)} fill="none" stroke={s.color} strokeWidth="2.2" />
        ))}
        {series.map((s) => data.map((row, i) => {
          const v = row[s.key];
          if (v === null || v === undefined) return null;
          return <circle key={s.key+i} cx={xFor(i)} cy={yFor(v)} r="2.6" fill={s.color} />;
        }))}
        {data.map((row, i) => (
          <text key={i} x={xFor(i)} y={H-padB+16} fontSize="10" textAnchor="middle" fill="#6B6270">{row[xKey]}</text>
        ))}
      </svg>
      <div style={{display:"flex", flexWrap:"wrap", gap:"10px 16px", marginTop:8, justifyContent:"center"}}>
        {series.map((s) => (
          <div key={s.key} style={{display:"flex", alignItems:"center", gap:5, fontSize:11, color:"#6B6270"}}>
            <span style={{width:10, height:10, borderRadius:99, background:s.color, display:"inline-block"}}></span>
            {s.key}
          </div>
        ))}
      </div>
      <p style={{fontSize:11, color:"#6B6270", marginTop:8}}>
        NCC (note /10) affiché ×10 sur la même échelle pour comparaison visuelle — voir le tableau détaillé pour la valeur exacte.
      </p>
    </div>
  );
}

/* ============================================================
   SOUS-COMPOSANTS
   ============================================================ */
function DayCountChart({ data, height=260 }) {
  if (!data.length) {
    return <p style={{fontSize:13, color:"var(--textMuted)"}}>Aucun écart avec une date exploitable sur la période sélectionnée.</p>;
  }
  const W = 700, H = height, padL = 30, padR = 10, padT = 20, padB = 60;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const max = Math.max(...data.map((d) => d.count), 4);
  const bw = innerW / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", height}}>
      <line x1={padL} x2={W-padR} y1={H-padB} y2={H-padB} stroke="var(--greyLine)" />
      {data.map((d, i) => {
        const barH = (d.count/max) * innerH;
        const x = padL + i*bw + bw*0.15;
        const w = bw*0.7;
        const y = H - padB - barH;
        return (
          <g key={d.date}>
            <rect x={x} y={y} width={w} height={barH} rx="3" fill="#96408F" />
            <text x={x+w/2} y={y-5} fontSize="10" fontWeight="700" textAnchor="middle" fill="#241C29">{d.count}</text>
            <text x={x+w/2} y={H-padB+14} fontSize="9" textAnchor="middle" fill="#6B6270" transform={`rotate(-40 ${x+w/2} ${H-padB+14})`}>
              {d.date.slice(5)}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function ReportingView({ ecarts, weekly, roster }) {
  const [granularity, setGranularity] = useState("tous");
  const [periodValue, setPeriodValue] = useState("Toutes");
  const [managerFilter, setManagerFilter] = useState("Tous");
  const [ancienneteFilter, setAncienneteFilter] = useState("Tous");
  const [visibleIndicators, setVisibleIndicators] = useState(() => new Set(INDICATEURS));

  const weekOptions = useMemo(() => {
    const set = new Set(ecarts.map((e) => extractWeekCode(e.semaine)).filter(Boolean));
    return [...set].sort();
  }, [ecarts]);
  const monthOptions = useMemo(() => {
    const set = new Set(ecarts.map((e) => weekToMonth(e.semaine)).filter(Boolean));
    return MONTH_ORDER.filter((m) => set.has(m));
  }, [ecarts]);
  const dayOptions = useMemo(() => {
    const set = new Set(ecarts.map((e) => e.date).filter(Boolean));
    return [...set].sort();
  }, [ecarts]);
  const managerOptions = useMemo(() => {
    const set = new Set(ecarts.map((e) => e.manager).filter(Boolean));
    return MANAGERS.filter((m) => set.has(m));
  }, [ecarts]);

  const filteredForOverview = useMemo(() => {
    return ecarts.filter((e) => {
      if (granularity !== "tous" && periodValue !== "Toutes") {
        if (granularity === "semaine" && extractWeekCode(e.semaine) !== periodValue) return false;
        if (granularity === "mois" && weekToMonth(e.semaine) !== periodValue) return false;
        if (granularity === "jour" && e.date !== periodValue) return false;
      }
      if (managerFilter !== "Tous" && e.manager !== managerFilter) return false;
      if (ancienneteFilter !== "Tous" && getConseillerStatus(e.conseiller, roster) !== ancienneteFilter) return false;
      return true;
    });
  }, [ecarts, granularity, periodValue, managerFilter, ancienneteFilter, roster]);

  const indStats = computeIndicatorStats(ecarts);
  const mgrStats = computeManagerStats(ecarts);
  const total = filteredForOverview.length;
  const totalDone = filteredForOverview.filter((e) => e.statut === "OK" || e.statut === "KO").length;
  const tauxGlobal = total ? Math.round((totalDone/total)*1000)/10 : 0;
  const alertesCount = filteredForOverview.filter((e) => e.alerte).length;
  const series = INDICATEURS
    .map((k, i) => ({ key: k, color: SERIES_COLORS[i] }))
    .filter((s) => visibleIndicators.has(s.key));

  function toggleIndicator(key){
    setVisibleIndicators((prev) => {
      const next = new Set(prev);
      if (next.has(key)) { if (next.size > 1) next.delete(key); } else next.add(key);
      return next;
    });
  }

  const hasRoster = roster && roster.length > 0;
  const anyFilterActive = (granularity !== "tous" && periodValue !== "Toutes") || managerFilter !== "Tous" || ancienneteFilter !== "Tous";

  return (
    <div>
      <div style={{marginBottom:28}}>
        <SectionTitle icon="📊">Vue d'ensemble</SectionTitle>
        <PeriodFilter
          granularity={granularity} setGranularity={setGranularity}
          value={periodValue} setValue={setPeriodValue}
          weekOptions={weekOptions} monthOptions={monthOptions} dayOptions={dayOptions}
        />
        <div className="filters" style={{marginBottom:16, marginTop:-8}}>
          <span style={{fontSize:12, color:"var(--textMuted)", fontWeight:600}}>Manager :</span>
          <select value={managerFilter} onChange={(e) => setManagerFilter(e.target.value)}>
            <option>Tous</option>
            {managerOptions.map((m) => <option key={m}>{m}</option>)}
          </select>
          <span style={{fontSize:12, color:"var(--textMuted)", fontWeight:600, marginLeft:8}}>Ancienneté :</span>
          <select value={ancienneteFilter} onChange={(e) => setAncienneteFilter(e.target.value)}>
            <option>Tous</option>
            <option>Nouveau</option>
            <option>Ancien</option>
            <option>Non renseigné</option>
          </select>
          {!hasRoster && (
            <span style={{fontSize:11, color:"var(--textMuted)"}}>
              (importe la répartition des équipes dans l'onglet Importer pour distinguer nouveaux/anciens)
            </span>
          )}
        </div>
        <div className="stat-row">
          <StatCard label="Taux de finalisation global" value={tauxGlobal+"%"} tone={tauxGlobal>=70?"good":tauxGlobal>=40?"accent":"bad"} sub={totalDone+"/"+total+" débriefées"} />
          <StatCard label="Évaluations en écart (total)" value={total} tone="neutral" />
          <StatCard label="Restant à débriefer" value={total-totalDone} tone={(total-totalDone)>0?"bad":"good"} />
          <StatCard label="Points d'alerte récurrence" value={alertesCount} tone={alertesCount>0?"bad":"good"} sub={alertesCount>0?"conseillers à surveiller":"aucun signal"} />
        </div>
        {anyFilterActive && (
          <p style={{fontSize:11, color:"var(--textMuted)", marginTop:8}}>
            Filtres actifs sur ce bloc uniquement — les graphiques ci-dessous restent calculés sur l'ensemble des données.
          </p>
        )}
      </div>

      <div style={{marginBottom:28}}>
        <SectionTitle icon="✅">Taux de déploiement des débriefings, par indicateur</SectionTitle>
        <div className="card"><BarChartV data={indStats} labelKey="indicateur" valueKey="taux" /></div>
      </div>

      <div style={{marginBottom:28}}>
        <SectionTitle icon="👥">Taux de déploiement des débriefings, par manager</SectionTitle>
        <div className="card"><BarChartH data={mgrStats} labelKey="manager" valueKey="taux" /></div>
      </div>

      <div>
        <SectionTitle icon="📈">Performance des indicateurs, semaine par semaine</SectionTitle>
        <div className="filters" style={{marginBottom:14}}>
          <span style={{fontSize:12, color:"var(--textMuted)", fontWeight:600}}>Indicateurs affichés :</span>
          {INDICATEURS.map((k, i) => (
            <button
              key={k}
              className="btn"
              style={visibleIndicators.has(k) ? { background:SERIES_COLORS[i], color:"#fff", borderColor:SERIES_COLORS[i] } : { color:"var(--textMuted)" }}
              onClick={() => toggleIndicator(k)}
            >
              {k}
            </button>
          ))}
        </div>
        <div className="card"><LineChartMulti data={weekly} series={series} xKey="semaine" /></div>
      </div>
    </div>
  );
}

/* ============================================================
   VUE : SUIVI DÉBRIEFING
   ============================================================ */
function EcartDetailPanel({ e, onSave, onDelete }) {
  const [draft, setDraft] = useState({ statut: e.statut, action: e.action, dateDebrief: e.dateDebrief, manager: e.manager });
  const [saving, setSaving] = useState(false);
  const [saveResult, setSaveResult] = useState(null); // null | {ok:true} | {ok:false, reason}

  useEffect(() => {
    setDraft({ statut: e.statut, action: e.action, dateDebrief: e.dateDebrief, manager: e.manager });
    setSaveResult(null);
  }, [e.id]);

  const dirty = draft.statut !== e.statut || draft.action !== e.action || draft.dateDebrief !== e.dateDebrief || draft.manager !== e.manager;

  async function handleSave(){
    setSaving(true);
    const result = await onSave(draft);
    setSaving(false);
    setSaveResult(result || { ok: false, reason: "unknown" });
    setTimeout(() => setSaveResult(null), 4000);
  }

  return (
    <div className="detail-panel">
      <div className="detail-grid">
        <div>
          <p className="field-label">Référence</p>
          <p className="field-value" style={{wordBreak:"break-all", color:"var(--textMuted)"}}>{e.reference || "—"}</p>
          <p className="field-label">Constat détaillé</p>
          <p className="field-value">{e.constat}</p>
          {e.alerte && <div className="status-msg err" style={{display:"inline-block"}}>⚠ {e.alerte}</div>}
        </div>
        <div>
          <p className="field-label">Statut du débriefing</p>
          <select style={{width:"100%", marginBottom:10}} value={draft.statut} onChange={(ev) => setDraft({...draft, statut: ev.target.value})}>
            {STATUTS.map((s) => <option key={s}>{s}</option>)}
          </select>
          <p className="field-label">Action réalisée auprès du conseiller</p>
          <textarea style={{width:"100%", marginBottom:10}} rows="2" value={draft.action} onChange={(ev) => setDraft({...draft, action: ev.target.value})}></textarea>
          <p className="field-label">Date du débriefing</p>
          <input type="date" style={{width:"100%", marginBottom:10}} value={draft.dateDebrief} onChange={(ev) => setDraft({...draft, dateDebrief: ev.target.value})} />
          <p className="field-label">Manager référent</p>
          <select style={{width:"100%", marginBottom:12}} value={draft.manager} onChange={(ev) => setDraft({...draft, manager: ev.target.value})}>
            {MANAGERS.map((m) => <option key={m}>{m}</option>)}
          </select>
          <div style={{display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
            <button className="btn primary" disabled={!dirty || saving} onClick={handleSave}>
              {saving ? "Enregistrement..." : "💾 Enregistrer"}
            </button>
            <button className="btn" style={{color:"var(--red)", background:"var(--redSoft)", borderColor:"var(--redSoft)"}} onClick={onDelete}>🗑 Supprimer cette ligne</button>
          </div>
          {saveResult && saveResult.ok && <div className="status-msg ok" style={{marginTop:10, display:"inline-block"}}>✓ Modifications enregistrées en ligne</div>}
          {saveResult && !saveResult.ok && (
            <div className="status-msg err" style={{marginTop:10, display:"inline-block"}}>
              ⚠ Modification appliquée mais non sauvegardée en ligne ({saveResult.reason === "unconfigured" ? "Firebase non configuré" : "connexion indisponible"}) — elle sera perdue à la fermeture de la page.
            </div>
          )}
          {dirty && !saveResult && !saving && <div style={{fontSize:11, color:"var(--amber)", marginTop:10}}>Modifications non enregistrées — clique sur « Enregistrer » pour les valider.</div>}
        </div>
      </div>
    </div>
  );
}

        <div className="search-box">

        </div>
        <select value={fInd} onChange={(e) => setFInd(e.target.value)}>

        </select>
        <button className="btn primary" onClick={() => setShowAdd(true)}>+ Ajouter un écart</button>
      </div>

      <div style={{fontSize:12, color:"var(--textMuted)", marginBottom:8}}>{filtered.length} ligne(s) affichée(s) sur {ecarts.length}</div>

      <div className="card" style={{padding:0, overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table>
            <thead>
              <tr>{["Indicateur","Conseiller","Semaine","Écart constaté","Statut","Manager",""].map((h) => <th key={h}>{h}</th>)}</tr>
            </thead>
            <tbody>
              {filtered.map((e) => (
                <Fragment key={e.id}>
                  <tr className={"clickable" + (e.alerte ? " alert-row" : "")} onClick={() => setExpanded(expanded===e.id ? null : e.id)}>
                    <td style={{color:"var(--purpleDark)", fontWeight:500}}>{e.indicateur}</td>
                    <td>{e.conseiller}</td>
                    <td style={{whiteSpace:"nowrap"}}>{e.semaine}</td>
                    <td><span className="truncate">{e.ecart}</span></td>
                    <td><Badge statut={e.statut} /></td>
                    <td style={{whiteSpace:"nowrap"}}>{e.manager}</td>
                    <td>{expanded===e.id ? "▴" : "▾"}</td>
                  </tr>
                  {expanded === e.id && (
                    <tr>
                      <td colSpan="7" style={{padding:0}}>
                        <EcartDetailPanel e={e} onSave={(patch) => saveRow(e.id, patch)} onDelete={() => deleteRow(e.id)} />
                      </td>
                    </tr>
                  )}
                </Fragment>
              ))}
              {filtered.length === 0 && <tr><td colSpan="7" style={{textAlign:"center", padding:24, color:"var(--textMuted)"}}>Aucune ligne ne correspond à ces filtres.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {showAdd && <AddEcartModal onClose={() => setShowAdd(false)} onAdd={addRow} />}
    </div>
  );
}

/* ============================================================
   VUE : IMPORT
   ============================================================ */
function ImportView({ ecarts, setEcarts, onImportJSON, roster, setRoster }) {
  const [status, setStatus] = useState(null);
  const [jsonStatus, setJsonStatus] = useState(null);
  const [rosterStatus, setRosterStatus] = useState(null);
  const [preview, setPreview] = useState([]);

  function handleRosterFile(file){
    const isExcel = /\.xlsx?$/i.test(file.name);
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        let rows = [];
        if (isExcel) {
          const wb = XLSX.read(evt.target.result, {type:"binary"});
          rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""});
        } else {
          rows = Papa.parse(evt.target.result, {header:true, skipEmptyLines:true}).data;
        }
        const mapped = rows.map((r) => {
          const conseillerRaw = r["Conseiller"] || r["conseiller"] || r["Nom complet"] || r["Diamant"] || r["Nom"] || "";
          const managerRaw = r["Manager"] || r["manager"] || "";
          const statutRaw = r["Statut"] || r["statut"] || r["Nouveau/Ancien"] || r["Nouveau / Ancien"] || "";
          const dateEntree = r["Date d'entrée en prod"] || r["Date d'entrée"] || r["dateEntreeProd"] || "";
          return {
            conseiller: String(conseillerRaw).trim(),
            manager: String(managerRaw).trim(),
            site: String(r["Site"] || r["site"] || r["SITE"] || "").trim(),
            statut: (statutRaw === "Nouveau" || statutRaw === "Ancien") ? statutRaw : "",
            dateEntreeProd: dateEntree ? String(dateEntree) : "",
          };
        }).filter((r) => r.conseiller);
        setRoster(mapped);
        setRosterStatus({ok:true, msg: mapped.length+" conseiller(s) chargé(s) dans la répartition des équipes. Ce contenu remplace la répartition précédente."});
      } catch(err){
        setRosterStatus({ok:false, msg:"Fichier illisible — colonnes attendues : Conseiller, Manager, Site (optionnel), Statut ou Date d'entrée en prod (optionnel)."});
      }
    };
    if (isExcel) reader.readAsBinaryString(file); else reader.readAsText(file);
  }

  function downloadRosterTemplate(){
    exportCSV([
      { Conseiller:"Rosa", Manager:"Ibra", Site:"MADA", Statut:"Ancien", "Date d'entrée en prod":"" },
      { Conseiller:"Jacky", Manager:"Hery", Site:"MADA", Statut:"Nouveau", "Date d'entrée en prod":"2026-06-01" },
    ], "modele_repartition_equipes.csv");
  }

  function handleJSONFile(file){
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!Array.isArray(data.ecarts)) throw new Error("format invalide");
        onImportJSON(data);
        setJsonStatus({ok:true, msg: "Chargé : "+data.ecarts.length+" écart(s)"+(data.historique_kpi ? " et "+data.historique_kpi.length+" semaine(s) d'historique" : "")+". Ce contenu remplace les données actuelles."});
      } catch(err){
        setJsonStatus({ok:false, msg:"JSON illisible — vérifie qu'il s'agit bien d'un export généré par ce tableau de bord."});
      }
    };
    reader.readAsText(file);
  }

  function handleFile(file){
    const isExcel = /\.xlsx?$/i.test(file.name);
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        let rows = [];
        if (isExcel) {
          const wb = XLSX.read(evt.target.result, {type:"binary"});
          rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""});
        } else {
          rows = Papa.parse(evt.target.result, {header:true, skipEmptyLines:true}).data;
        }
        setPreview(rows.slice(0,8));
        const mapped = rows.map((r) => ({
          id: uid(),
          indicateur: r["Indicateur"] || r["indicateur"] || "Hubicus Voix",
          conseiller: r["Conseiller"] || r["conseiller"] || "",
          reference: r["Référence"] || r["reference"] || r["N° de ticket"] || "",
          semaine: r["Semaine"] || r["semaine"] || "",
          date: r["Date"] || r["date"] || "",
          ecart: r["Écart constaté"] || r["ecart"] || "",
          statut: r["Débriefing (OK/KO)"] || r["statut"] || "À traiter",
          action: r["Action réalisée"] || r["action"] || "",
          dateDebrief: r["Date du débriefing"] || "",
          constat: r["Constat détaillé"] || r["constat"] || "",
          managerDispatch: r["Manager (dispatch)"] || "",
          manager: r["Manager (simplifié)"] || r["manager"] || "Non trouvé",
          alerte: r["Alerte récurrence"] || "",
        })).filter((r) => r.conseiller);
        const existingRefs = new Set(ecarts.map((e) => e.reference));
        const news = mapped.filter((m) => !existingRefs.has(m.reference));
        setEcarts((prev) => [...prev, ...news]);
        setStatus({ok:true, msg: news.length+" nouvelle(s) ligne(s) ajoutée(s) ("+(mapped.length-news.length)+" doublon(s) ignoré(s) par référence)."});
      } catch(err){
        setStatus({ok:false, msg:"Fichier illisible — vérifie les colonnes attendues (Indicateur, Conseiller, Référence, Semaine, Date, Écart constaté...)."});
      }
    };
    if (isExcel) reader.readAsBinaryString(file); else reader.readAsText(file);
  }

  function downloadTemplate(){
    exportCSV([{
      Indicateur:"Hubicus Voix", Conseiller:"", "Référence":"", Semaine:"S29", Date:"",
      "Écart constaté":"", "Débriefing (OK/KO)":"", "Action réalisée":"", "Date du débriefing":"",
      "Constat détaillé":"", "Manager (dispatch)":"", "Manager (simplifié)":"", "Alerte récurrence":"",
    }], "modele_import_ecarts.csv");
  }

  return (
    <div>
      <SectionTitle icon="⬆">Importer une extraction</SectionTitle>

      <div className="notice info" style={{marginBottom:16}}>
        <span className="ic">ℹ</span>
        <div>Ce tableau de bord importe une extraction <strong>déjà consolidée</strong> (CSV ou Excel avec les colonnes
        Indicateur / Conseiller / Référence / Semaine / Écart constaté...). Les fichiers sources bruts (grille téléphone
        Hubicus, contrôle process Auchan/Interne, transferts) ont des structures spécifiques par onglet — fais-les
        d'abord traiter par Claude en conversation, qui te renverra un CSV au bon format à importer ici.</div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:600, color:"var(--purpleDark)", marginBottom:8, fontSize:14}}>Recharger un export JSON</div>
        <p style={{fontSize:13, color:"var(--textMuted)", marginTop:0}}>
          Reprends ici un fichier <code>.json</code> téléchargé depuis l'onglet Extractions — par exemple après
          l'avoir fait enrichir par Claude, ou pour le recharger dans un autre navigateur. Le contenu remplace
          entièrement les écarts et l'historique KPI actuellement affichés.
        </p>
        <label className="drop">
          ⬆ Choisir un fichier .json
          <input type="file" accept=".json,application/json" style={{display:"none"}} onChange={(e) => e.target.files[0] && handleJSONFile(e.target.files[0])} />
        </label>
        {jsonStatus && <div className={"status-msg " + (jsonStatus.ok ? "ok" : "err")}>{jsonStatus.msg}</div>}
      </div>

      <div className="divider-row"><div className="line"></div><span>ou ajouter des lignes depuis un CSV / Excel</span><div className="line"></div></div>

      <div style={{display:"flex", flexWrap:"wrap", gap:12, marginBottom:12}}>
        <label className="drop" style={{flex:1, minWidth:220}}>
          ⬆ Choisir un fichier (.csv, .xlsx)
          <input type="file" accept=".csv,.xlsx,.xls" style={{display:"none"}} onChange={(e) => e.target.files[0] && handleFile(e.target.files[0])} />
        </label>
        <button className="btn" onClick={downloadTemplate}>⬇ Télécharger le modèle CSV</button>
      </div>

      {status && <div className={"status-msg " + (status.ok ? "ok" : "err")}>{status.msg}</div>}

      <div className="divider-row"><div className="line"></div><span>répartition des équipes</span><div className="line"></div></div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{fontWeight:600, color:"var(--purpleDark)", marginBottom:8, fontSize:14}}>Importer la répartition des équipes</div>
        <p style={{fontSize:13, color:"var(--textMuted)", marginTop:0}}>
          Fichier conseiller → manager (ex. onglet « Config » du fichier Transfert, ou le dispatch mensuel).
          Colonnes reconnues : <code>Conseiller</code> (ou Nom complet / Diamant), <code>Manager</code>, <code>Site</code> (optionnel),
          et soit <code>Statut</code> (Nouveau/Ancien), soit <code>Date d'entrée en prod</code> (un conseiller entré il y a moins de
          {" "}{NOUVEAU_ANCIEN_SEUIL_JOURS} jours est classé « Nouveau » automatiquement). Ceci alimente le filtre
          Nouveau/Ancien et le rapprochement manager dans l'onglet Reporting.
        </p>
        <div style={{display:"flex", flexWrap:"wrap", gap:12}}>
          <label className="drop" style={{flex:1, minWidth:220}}>
            ⬆ Choisir un fichier équipes (.csv, .xlsx)
            <input type="file" accept=".csv,.xlsx,.xls" style={{display:"none"}} onChange={(e) => e.target.files[0] && handleRosterFile(e.target.files[0])} />
          </label>
          <button className="btn" onClick={downloadRosterTemplate}>⬇ Télécharger le modèle CSV</button>
        </div>
        {rosterStatus && <div className={"status-msg " + (rosterStatus.ok ? "ok" : "err")}>{rosterStatus.msg}</div>}
        {roster && roster.length > 0 && (
          <p style={{fontSize:12, color:"var(--textMuted)", marginTop:10}}>
            Répartition actuelle : {roster.length} conseiller(s) — {roster.filter((r) => r.statut === "Nouveau" || (r.dateEntreeProd && (Date.now() - new Date(r.dateEntreeProd).getTime())/86400000 <= NOUVEAU_ANCIEN_SEUIL_JOURS)).length} « Nouveau » détecté(s).
          </p>
        )}
      </div>


      {preview.length > 0 && (
        <div className="card" style={{overflowX:"auto", marginTop:14}}>
          <div style={{fontSize:12, fontWeight:600, color:"var(--purpleDark)", marginBottom:8}}>Aperçu (8 premières lignes lues)</div>
          <table style={{fontSize:12}}>
            <thead><tr>{Object.keys(preview[0]).slice(0,6).map((k) => <th key={k} style={{color:"var(--textMuted)", background:"none"}}>{k}</th>)}</tr></thead>
            <tbody>
              {preview.map((r,i) => (
                <tr key={i}>{Object.keys(preview[0]).slice(0,6).map((k) => <td key={k} style={{maxWidth:160, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{String(r[k])}</td>)}</tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function ExportView({ ecarts, weekly, roster }) {

      </div>

      <div className="notice warn">
        <span className="ic">⚠</span>

        disponible côté navigateur). Le bouton « Export pour régénérer le PowerPoint » télécharge un fichier JSON
        structuré — dépose-le dans une conversation Claude pour obtenir automatiquement les slides mises à jour.</div>
      </div>
    </div>
  );
}

/* ============================================================
   APP PRINCIPALE
   ============================================================ */
function App(){
  const [tab, setTab] = useState("reporting");
  const [ecarts, setEcarts] = useState(SEED_ECARTS);
  const [weekly, setWeekly] = useState(SEED_WEEKLY);
  const [roster, setRoster] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [connStatus, setConnStatus] = useState("connecting"); // connecting | ok | unconfigured | error
  const [connError, setConnError] = useState("");
  const firstLoad = React.useRef(true);

  // Chargement initial + abonnement temps réel
  useEffect(() => {
    let unsubEcarts = () => {};
    let unsubWeekly = () => {};
    let unsubRoster = () => {};

    (async () => {
      const resE = await fsLoad(STORAGE_KEY_ECARTS, SEED_ECARTS);
      const resW = await fsLoad(STORAGE_KEY_WEEKLY, SEED_WEEKLY);
      const resR = await fsLoad(STORAGE_KEY_ROSTER, []);
      setEcarts(resE.value);
      setWeekly(resW.value);
      setRoster(resR.value);
      setConnStatus(resE.status);
      setConnError(resE.error || "");
      setLoaded(true);
      firstLoad.current = false;

      if (resE.status === "ok") {
        unsubEcarts = fsSubscribe(STORAGE_KEY_ECARTS, (val) => setEcarts(val));
        unsubWeekly = fsSubscribe(STORAGE_KEY_WEEKLY, (val) => setWeekly(val));
        unsubRoster = fsSubscribe(STORAGE_KEY_ROSTER, (val) => setRoster(val));
      }
    })();

    return () => { unsubEcarts(); unsubWeekly(); unsubRoster(); };
  }, []);

  // Sauvegarde (debounce) à chaque changement, une fois le chargement initial fait
  useEffect(() => {
    if (!loaded) return;
    setSaving(true);
    const t = setTimeout(async () => {
      if (connStatus === "ok") {
        await fsSave(STORAGE_KEY_ECARTS, ecarts);
        await fsSave(STORAGE_KEY_WEEKLY, weekly);
        await fsSave(STORAGE_KEY_ROSTER, roster);
      }
      setSaving(false);
    }, 500);
    return () => clearTimeout(t);
  }, [ecarts, weekly, roster, loaded, connStatus]);

  async function saveNow(ecartsToSave, weeklyToSave){
    if (connStatus !== "ok") return { ok: false, reason: connStatus };
    setSaving(true);
    await fsSave(STORAGE_KEY_ECARTS, ecartsToSave);
    await fsSave(STORAGE_KEY_WEEKLY, weeklyToSave);
    setSaving(false);
    return { ok: true };
  }

  function importFromJSON(data){
    if (Array.isArray(data.ecarts)) setEcarts(data.ecarts.map((e) => ({...e, id: e.id ?? uid()})));
    if (Array.isArray(data.historique_kpi)) setWeekly(data.historique_kpi);
    if (Array.isArray(data.repartition_equipes)) setRoster(data.repartition_equipes);
  }

  const tabs = [
    { id:"reporting", label:"Reporting", icon:"📊" },
    { id:"performance", label:"Suivi performance", icon:"📈" },
    { id:"debriefing", label:"Suivi débriefing", icon:"📋" },
    { id:"import", label:"Importer", icon:"⬆" },
    { id:"export", label:"Extractions", icon:"🗄" },
  ];

  const statusLabel = {
    connecting: "Connexion...",
    ok: saving ? "Enregistrement..." : "Connecté — partagé en ligne (Firebase)",
    unconfigured: "Mode local — Firebase non configuré (voir README)",
    error: "Erreur de connexion Firebase — données non partagées",
  }[connStatus];

  return (
    <div>
      <div className="header">
        <div className="wrap header-inner">
          <div>
            <h1>Suivi Qualité — TERSEA Madagascar</h1>
            <p>Débriefings managers · Reporting · Compte Auchan · Site Mada</p>
          </div>
          <div className="status">💾 {statusLabel}</div>
        </div>
      </div>

      {connStatus === "unconfigured" && (
        <div className="wrap" style={{paddingTop:14}}>
          <div className="notice warn">
            <span className="ic">⚠</span>
            <div>
              Firebase n'est pas encore configuré : les données sont conservées uniquement dans <strong>ce
              navigateur</strong>, pas partagées avec les autres. Suis les étapes du fichier <code>README.md</code>
              (créer un projet Firebase gratuit, activer Firestore, coller la config en haut du fichier HTML) pour
              activer le partage en ligne entre utilisateurs.
            </div>
          </div>
        </div>
      )}
      {connStatus === "error" && (
        <div className="wrap" style={{paddingTop:14}}>
          <div className="notice warn">
            <span className="ic">⚠</span>
            <div>Impossible de se connecter à Firebase ({connError || "erreur inconnue"}). Vérifie la configuration
            et les règles Firestore (fichier <code>firestore.rules</code>). En attendant, les modifications restent
            en mémoire locale et seront perdues à la fermeture de la page.</div>
          </div>
        </div>
      )}

      <div className="tabs">
        <div className="wrap tabs-inner">
          {tabs.map((t) => (
            <button key={t.id} className={"tab-btn" + (tab===t.id ? " active" : "")} onClick={() => setTab(t.id)}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
      </div>

      <div className="wrap content">
        {tab === "reporting" && <ReportingView ecarts={ecarts} weekly={weekly} roster={roster} />}
        {tab === "performance" && <PerformanceView ecarts={ecarts} weekly={weekly} />}
        {tab === "debriefing" && <DebriefingView ecarts={ecarts} setEcarts={setEcarts} weekly={weekly} onSaveNow={saveNow} />}
        {tab === "import" && <ImportView ecarts={ecarts} setEcarts={setEcarts} onImportJSON={importFromJSON} roster={roster} setRoster={setRoster} />}
        {tab === "export" && <ExportView ecarts={ecarts} weekly={weekly} roster={roster} />}
      </div>

      <div className="footer">
        TERSEA · Site Mada · Compte Auchan — {connStatus === "ok" ? "données partagées en ligne via Firebase" : "voir README.md pour activer le partage en ligne"}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
